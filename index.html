<title>Ringeliste</title>

<style>
:root {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --ink: #14171F;
  --ink-muted: #5B6472;
  --ink-faint: #828B96;
  --border: #E2E5EA;
  --brand: #0E6E6E;
  --overdue: #C0392B;
  --today: #C2750C;
  --st-new: #5B6472;
  --st-callback: #C2750C;
  --st-no: #94A0AE;
  --st-won: #15803D;
  --st-noanswer: #5B7FA6;
  --st-wrong: #8B5E5E;
  --radius: 12px;
  --radius-sm: 8px;
  --chart: #0D9488;
}
* , *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  min-height: 100vh;
}
#app { max-width: 600px; margin: 0 auto; }
.topbar { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 14px 20px 6px; }
.topbar-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--brand); }
.view { padding: 8px 16px 24px; }
.view-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; margin: 4px 0 16px; }
.hero { text-align: center; padding: 22px 0 18px; }
.hero-number { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 64px; line-height: 1; color: var(--ink); }
.hero-label { font-size: 14px; color: var(--ink-muted); margin-top: 4px; }
.section-label { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin: 18px 2px 8px; }
.section-label-overdue { color: var(--overdue); }
.section-label-today { color: var(--today); }
.card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--ink-faint); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; cursor: pointer; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-name { font-weight: 600; font-size: 15px; }
.card-sub { font-size: 13px; color: var(--ink-muted); margin-top: 2px; }
.card-note { font-size: 13px; color: var(--ink-muted); margin-top: 6px; line-height: 1.4; }
.card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; min-height: 20px; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
.call-link { display: inline-flex; align-items: center; gap: 6px; color: var(--brand); font-weight: 600; font-size: 14px; text-decoration: none; }
.call-link-big { background: var(--brand); color: #fff; padding: 13px 16px; border-radius: var(--radius-sm); justify-content: center; width: 100%; margin: 14px 0 6px; font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; }
.callback-date { font-size: 12px; color: var(--ink-faint); font-weight: 600; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-muted); }
.empty-sub { font-size: 13px; color: var(--ink-faint); margin: 4px 0 0; }
.search-input { width: 100%; font-size: 16px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 10px; }
.filter-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 4px; -webkit-overflow-scrolling: touch; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip { flex: 0 0 auto; font-size: 13px; font-weight: 500; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--ink-muted); }
.chip-active { background: var(--brand); border-color: var(--brand); color: #fff; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin: 0 0 12px; }
.panel-danger { border-color: #EAC4C0; }
.form-grid { display: flex; flex-direction: column; gap: 12px; }
label { display: block; font-size: 13px; color: var(--ink-muted); font-weight: 500; }
input, select, textarea { display: block; width: 100%; margin-top: 5px; font-size: 16px; font-family: inherit; color: var(--ink); padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; }
textarea { resize: vertical; min-height: 70px; }
input:focus, select:focus, textarea:focus, button:focus-visible, a:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }
.btn { display: block; width: 100%; text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; padding: 13px; border-radius: var(--radius-sm); border: none; margin-top: 14px; cursor: pointer; box-sizing: border-box; }
.btn-primary { background: var(--brand); color: #fff; }
.btn-secondary { background: #fff; color: var(--ink); border: 1px solid var(--border); }
.btn-danger { background: #fff; color: var(--overdue); border: 1px solid #EAC4C0; }
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { margin-top: 10px; }
.back-btn { background: none; border: none; color: var(--ink-muted); font-size: 14px; padding: 6px 0; margin-bottom: 6px; cursor: pointer; font-family: inherit; }
.detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
.note-entry { padding: 10px 0; border-top: 1px solid var(--border); }
.note-entry:first-child { border-top: none; padding-top: 0; }
.note-date { font-size: 12px; color: var(--ink-faint); font-weight: 600; margin-bottom: 3px; }
.note-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.proff-row { margin: 2px 0 0; }
.link-btn { font-size: 13px; color: var(--brand); text-decoration: none; font-weight: 600; }
.brreg-loading, .brreg-empty { font-size: 12px; color: var(--ink-faint); padding: 8px 2px; }
.brreg-item { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; margin-top: 6px; cursor: pointer; font-family: inherit; }
.brreg-item strong { font-size: 13px; }
.brreg-item span { font-size: 12px; color: var(--ink-muted); }
.import-list { max-height: 220px; overflow-y: auto; margin: 10px 0; }
.import-row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.stats-grid { display: flex; gap: 10px; }
.stat { flex: 1; text-align: center; }
.stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
.bottomnav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; display: flex; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); max-width: 600px; margin: 0 auto; }
.navtab { flex: 1; background: none; border: none; padding: 8px 4px; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink-faint); cursor: pointer; border-radius: 8px; }
.navtab-active { color: var(--brand); background: rgba(14,110,110,0.08); }
.org-tag { font-size: 11px; color: var(--brand); font-weight: 600; margin-top: 2px; }
.eier-tag { font-size: 11px; font-weight: 600; margin-top: 3px; color: #6D4FC2; }
.pool-tag { font-size: 11px; font-weight: 600; margin-top: 3px; color: var(--ink-faint); }
.selger-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; color: var(--brand); cursor: pointer; }
.selger-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid var(--border); }
.selger-row:first-of-type { border-top: none; padding-top: 0; }
.selger-row-navn { font-weight: 600; font-size: 15px; }
.selger-row-sub { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
.selger-aktiv-badge { font-size: 11px; font-weight: 700; color: var(--st-won); background: rgba(21,128,61,0.1); border-radius: 999px; padding: 3px 9px; white-space: nowrap; }
.btn-mini { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #fff; color: var(--brand); cursor: pointer; white-space: nowrap; }
.filter-select { width: auto; font-size: 13px; padding: 9px 11px; margin-bottom: 10px; }
.reveal-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 10px 0; }
.reveal-label { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-muted); margin-bottom: 8px; }
.reveal-content p { margin: 0 0 8px; font-size: 14px; line-height: 1.5; }
.reveal-content p:last-child { margin-bottom: 0; }
.reveal-content strong { color: var(--brand); }
.innvending-item { padding: 10px 0; border-top: 1px solid var(--border); }
.innvending-item:first-child { border-top: none; padding-top: 0; }
.innvending-q { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
.innvending-a { font-size: 13px; color: var(--ink-muted); line-height: 1.4; }
.innvending-del { background: none; border: none; color: var(--overdue); font-size: 12px; padding: 6px 0 0; cursor: pointer; font-family: inherit; }
.org-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; cursor: pointer; }
.org-card-name { font-weight: 600; font-size: 15px; }
.org-card-desc { font-size: 13px; color: var(--ink-muted); margin-top: 3px; line-height: 1.4; }
.org-card-count { font-size: 11px; color: var(--ink-faint); margin-top: 6px; }
.tax-fact p { margin: 0 0 8px; font-size: 13px; line-height: 1.5; }
.tax-fact p:last-child { margin-bottom: 0; }
.outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.outcome-btn { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; padding: 14px 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: #fff; cursor: pointer; color: var(--ink); }
.outcome-solgt { grid-column: 1 / -1; background: var(--st-won); border-color: var(--st-won); color: #fff; font-size: 17px; padding: 16px; }
.when-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
.ringe-progress { font-size: 13px; font-weight: 600; color: var(--ink-muted); margin-bottom: 6px; }
.progress-track { height: 5px; background: var(--border); border-radius: 999px; margin-bottom: 14px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--brand); border-radius: 999px; }
.ringe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.ringe-name { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 600; }
.big-start { font-size: 17px; padding: 17px; }
.chart-row { display: flex; gap: 2px; align-items: stretch; height: 150px; }
.chart-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chart-val { height: 14px; font-size: 10px; font-weight: 600; color: var(--ink-muted); text-align: center; white-space: nowrap; overflow: visible; }
.chart-barwrap { flex: 1; display: flex; align-items: flex-end; }
.chart-bar { width: 100%; background: var(--chart); border-radius: 4px 4px 0 0; }
.chart-bar-zero { width: 100%; background: var(--border); height: 2px; }
.chart-lab { height: 15px; font-size: 10px; color: var(--ink-faint); text-align: center; margin-top: 3px; white-space: nowrap; }
.salg-panel { background: #ECFDF5; border: 1px solid #A7F3D0; border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; }
.salg-entry { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 9px 0; border-top: 1px solid var(--border); font-size: 14px; }
.salg-entry:first-of-type { border-top: none; }
.salg-belop { font-weight: 700; white-space: nowrap; }
.angre-bar { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 12px; color: var(--ink-muted); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 11px; margin-bottom: 10px; }
.angre-bar button { background: none; border: none; color: var(--brand); font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; padding: 4px 6px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>

<script>

  var BRANSJER = [
    { label: 'Alle bransjer', kode: '' },
    { label: 'Bygg og anlegg', kode: '41,42,43' },
    { label: 'Varehandel / butikk', kode: '47' },

  function defaultOrganisasjoner() {
    return [
      { id: 'org-naaf', navn: 'Astma- og Allergiforbundet', kortBeskrivelse: 'Pasient- og interesseorganisasjon for astma, allergi, eksem og kols. Rundt 1,5 millioner nordmenn er rammet av disse diagnosene. Driver blant annet den nasjonale pollenvarslingen, en rådgivningstjeneste og støtter forskning.', hvorfor: 'Astma og allergi rammer stadig flere barn — annonsen støtter informasjonsarbeid, rådgivning og forskning som hjelper familier direkte.', innvendinger: [], anbefalteNaeringer: ['Bygg og anlegg', 'Bilverksted og bilpleie', 'Helse- og omsorgstjenester', 'Industri og produksjon', 'Personlig tjenesteyting (frisør mm.)'] },
      { id: 'org-blakors', navn: 'Blå Kors', kortBeskrivelse: 'Ideell, diakonal organisasjon som arbeider mot rus- og spillavhengighet. Driver behandlingsinstitusjoner, forebygging for barn/unge og oppfølging etter behandling over store deler av Norge.', hvorfor: 'Rus rammer ikke bare den som sliter, men hele familien — Blå Kors jobber både med forebygging blant unge og behandling/oppfølging i etterkant.', innvendinger: [], anbefalteNaeringer: ['Overnatting og servering', 'Helse- og omsorgstjenester', 'Varehandel / butikk', 'Kultur, idrett og fritid', 'Personlig tjenesteyting (frisør mm.)'] },
      { id: 'org-rodekors', navn: 'Røde Kors', kortBeskrivelse: 'Norges største humanitære organisasjon. Driver blant annet hjelpekorps/redningstjeneste, besøkstjeneste, leksehjelp, flyktningarbeid og internasjonal nødhjelp.', hvorfor: 'Lokalt og internasjonalt — Røde Kors er ofte først på stedet ved ulykker og kriser, og bygger fellesskap året rundt gjennom lokale aktiviteter.', innvendinger: [], anbefalteNaeringer: ['Transport og lager', 'Bygg og anlegg', 'Finans og forsikring', 'Eiendom', 'Varehandel / butikk'] }
    ];
  }
  function defaultGenerelleInnvendinger() {
    return [
      { id: uid(), innvending: 'Åpn med et ja-spørsmål', tips: 'Start med: "Er du den som tar avgjørelser om markedsføring hos [firma]?" Det setter deg rett inn i riktig samtale og sparer tid på feil person.' },
      { id: uid(), innvending: 'Bruk firmanavnet aktivt', tips: 'Si firmanavnet tidlig og knytt det til formålet: "Vi ønsker at [firma] skal stå som en synlig støttespiller for [org] i dette området." Det gjør det konkret og personlig.' },
      { id: uid(), innvending: 'Gi en konkret størrelse tidlig', tips: 'Nevn beløpet og sammenlign det med noe kjent: "Vi snakker om en støtteannonse for [beløp] kr — omtrent det samme som én reklameannonse i lokalsavisa." Det gjør det lett å forholde seg til.' },
      { id: uid(), innvending: 'Knytt det til nærmiljøet', tips: '"Vi setter sammen en kampanje for [org] i dette distriktet, og leter etter lokale bedrifter som ønsker å bli synlige støttespillere." Lokal tilhørighet treffer mange bedriftseiere.' },
      { id: uid(), innvending: 'Trekk frem skattefradraget tidlig', tips: 'Fortell raskt at dette er fradragsberettiget som markedsføring — ikke gave. Det fjerner en vanlig skepsis og gjør at de ser det som en forretningsbeslutning, ikke veldedighet.' },
      { id: uid(), innvending: 'Ha organisasjonen på 20 sekunder klar', tips: 'Forbered én konkret setning: hva [org] gjør og hvem de hjelper. Tall funker bra: "Røde Kors rykker ut ved over 2 000 redningsaksjoner i Norge hvert år." Det skaper relevans raskt.' },
      { id: uid(), innvending: 'Spør om de støtter noe fra før', tips: '"Støtter dere allerede noen frivillige organisasjoner?" Svaret gir deg en inngang uansett hva de sier — og viser at du er interessert i dem, ikke bare i salget.' },
      { id: uid(), innvending: 'Avslutt alltid med neste steg', tips: 'Ikke avslutt uten et konkret neste steg: dato for tilbakering, e-post du sender, eller bekreftelse. "Kan jeg ringe deg igjen fredag kl. 10?" er mye sterkere enn "ok, tenk på det".' },

  var organisasjoner = [];

  var state = { view: 'dashboard', selectedId: null, search: '', filter: 'all', orgFilter: '', eierFilter: '', salgVisning: 'mine', brregResults: [], ringeQueue: [], ringeIndex: 0, ringeTips: null, visRingTilbake: false, visSkatt: false, tipsKategori: 'salg', pendingEnhet: null, visSalg: false, salgMnd: 12, sisteUtfall: null, onboardFeil: null, onboardHenter: false };

  // ---------- Storage ----------
  // Kunder kan komme fra eldre versjoner eller andres enheter via skyen —
  // sørg for at feltene koden regner med alltid finnes.
  function normaliserKunde(k) {

  function load() {

  // ---------- Selgere ----------
  var selgere = [];

  function loadSelgere() {

  function setAktivSelger(id) {

  }
  function selgerById(id) { return selgere.filter(function (s) { return s.id === id; })[0] || null; }
  function aktivSelger() { return selgerById(aktivSelgerId); }
  function selgerNavn(id) {
    var s = selgerById(id);
    return s ? (s.fornavn + ' ' + (s.etternavn || '')).trim() : '';
  }
  function addSelger(fornavn, etternavn) {
    var s = { id: uid(), fornavn: fornavn, etternavn: etternavn || '', opprettet: new Date().toISOString() };
    selgere.push(s);
    saveSelgere();
    return s;
  }
  function selgerKundeAntall(id) {
    return kunder.filter(function (k) { return k.eierId === id; }).length;
  }
  function selgerSalgSum(id) {
    var sum = 0;
    kunder.forEach(function (k) {
      (k.salg || []).forEach(function (s) { if (s.selgerId === id) sum += s.belop || 0; });
    });

  // ---------- Pool og eierskap ----------
  // En kunde uten eierId ligger i den felles poolen. Når en selger bygger
  // ringekø reserveres pool-kundene (reservertAv) så andre ikke får dem.
  // Salg eller oppfølgingsdato gjør kunden til selgerens egen; andre utfall
  // slipper kunden tilbake i poolen.
  var RESERVASJON_MINUTTER = 30;
  function reservasjonUtlopt(k) {
    return !!(k.reservertTil && new Date(k.reservertTil).getTime() < Date.now());
  }
  function tilgjengeligFor(k, selgerId) {
    if (k.eierId && k.eierId !== selgerId) return false;
    if (k.reservertAv && k.reservertAv !== selgerId && !reservasjonUtlopt(k)) return false;
    return true;
  }
  // Merk: reservasjon/frigivelse bumper bevisst IKKE kundens oppdatert-felt.
  // Server-lagringen (lagre_kunder) lar raden med nyest/likt tidsstempel
  // vinne — dermed går en frigivelse av egen reservasjon gjennom (likt
  // tidsstempel), mens en treg klient taper mot en nyere RPC-reservasjon.
  function reserverKo() {
    if (!aktivSelgerId) return;
    var til = new Date(Date.now() + RESERVASJON_MINUTTER * 60000).toISOString();
    var changed = false;
    (state.ringeQueue || []).forEach(function (id) {
      var k = kunder.filter(function (x) { return x.id === id; })[0];
      if (k && !k.eierId && (k.reservertAv !== aktivSelgerId || !k.reservertTil)) { k.reservertAv = aktivSelgerId; k.reservertTil = til; changed = true; }
    });
    if (changed) save();
  }
  function oppdaterEierEtterUtfall(k, status) {
    k.reservertAv = null;
    k.reservertTil = null;
    if (status === 'solgt' || status === 'ring_tilbake') {
      if (aktivSelgerId && (!k.eierId || k.eierId === aktivSelgerId)) k.eierId = aktivSelgerId;
    } else if (!(k.salg || []).length) {
      k.eierId = null;
    }
    save();
  }

  // ---------- Skysynkronisering (Supabase) ----------
  // localStorage er fortsatt sannheten lokalt (appen virker offline). Med
  // teamkode satt speiles kunder og selgere til Supabase: endringer pushes
  // som diff mot forrige synk, og andre enheters endringer hentes ved
  // oppstart, hvert 25. sekund og når fanen får fokus. Konflikter avgjøres
  // av kundens oppdatert-tidsstempel (nyeste vinner). Sletting er alltid
  // soft-delete (slettet-kolonnen) så den når alle enheter.
  var sky = { teamkode: '', team: null, sistSynk: null, sistPull: null, feil: null, pushTimer: null, pollTimer: null, snapshot: null, pusher: false, pushIgjen: false };

  function skyKonfigurert() { return !!(SUPABASE_URL && SUPABASE_ANON_KEY); }
  function skyAktiv() { return skyKonfigurert() && !!sky.teamkode; }

  // ---------- Backend-styrt innhold og teaminfo ----------
  // Salgstips, skattetips og organisasjonsinfo administreres i Supabase
  // (innhold-tabellen) og er skrivebeskyttet i appen. Radene caches lokalt
  // for offline-start og bygges om til de samme variablene resten av appen
  // alltid har brukt (organisasjoner, generelleInnvendinger, skatteTips).
  var innholdRader = {};
  function loadInnhold() {
    try { innholdRader = JSON.parse(localStorage.getItem(INNHOLD_KEY)) || {}; } catch (e) { innholdRader = {}; }
    byggInnholdLister();
  }
  function saveInnhold() {
    try { localStorage.setItem(INNHOLD_KEY, JSON.stringify(innholdRader)); } catch (e) {}
  }
  function byggInnholdLister() {
    var org = [], salg = [], skatt = [];
    Object.keys(innholdRader).sort().forEach(function (id) {
      var r = innholdRader[id];
      if (!r || r.slettet || !r.data) return;
      if (r.type === 'organisasjon') org.push(r.data);
      else if (r.type === 'salgstips') salg.push({ id: r.id, innvending: r.data.innvending, tips: r.data.tips });
      else if (r.type === 'skattetips') skatt.push({ id: r.id, innvending: r.data.innvending, tips: r.data.tips });
    });
    organisasjoner = org;
    generelleInnvendinger = salg;
    skatteTips = skatt;
  }
  function settTeamInfo(rad) {
    sky.team = { navn: rad.navn || '', maalSamtaler: Number(rad.maal_samtaler) || 20, maalKroner: Number(rad.maal_kroner) || 10000, kriterier: rad.brreg_kriterier || null };
    maal = { samtaler: sky.team.maalSamtaler, kroner: sky.team.maalKroner };

  // JSONB i Postgres bevarer ikke rekkefølgen på nøkler, så diffing må
  // bruke en nøkkelsortert serialisering for å slippe evige ekko-pusher.
  function stabilJson(v) {
    if (v === null || typeof v !== 'object') return JSON.stringify(v) || 'null';
    if (Array.isArray(v)) return '[' + v.map(stabilJson).join(',') + ']';
    var keys = Object.keys(v).filter(function (k) { return v[k] !== undefined; }).sort();
    return '{' + keys.map(function (k) { return JSON.stringify(k) + ':' + stabilJson(v[k]); }).join(',') + '}';
  }

  function skyFetch(path, opts) {
    opts = opts || {};
    var headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
    if (opts.prefer) headers['Prefer'] = opts.prefer;
    return fetch(SUPABASE_URL + '/rest/v1/' + path, { method: opts.method || 'GET', headers: headers, body: opts.body ? JSON.stringify(opts.body) : undefined })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.status === 204 ? null : res.json();
      });
  }

  function skyRpc(navn, body) {
    return skyFetch('rpc/' + navn, { method: 'POST', body: body });
  }

  // Tar imot rader fra en RPC (autoritative — allerede skrevet i databasen)
  // og legger dem rett inn lokalt uten LWW-sammenligning.
  function skyTaImotRader(rader) {
    if (!rader || !rader.length) return;
    if (!sky.snapshot) sky.snapshot = { kunder: {}, selgere: {} };
    rader.forEach(function (rad) {
      if (rad.slettet) return;
      normaliserKunde(rad.data);
      var lokal = kunder.filter(function (x) { return x.id === rad.id; })[0];
      if (lokal) kunder[kunder.indexOf(lokal)] = rad.data;
      else kunder.unshift(rad.data);
      sky.snapshot.kunder[rad.id] = stabilJson(rad.data);
    });
    save();
  }

  function skyMergeKunde(rad) {
    var lokal = kunder.filter(function (x) { return x.id === rad.id; })[0];
    if (rad.slettet) {
      delete (sky.snapshot.kunder)[rad.id];
      if (lokal) { kunder = kunder.filter(function (x) { return x.id !== rad.id; }); return true; }
      return false;
    }
    var fjern = normaliserKunde(rad.data);
    if (!lokal) {
      kunder.unshift(fjern);
      sky.snapshot.kunder[rad.id] = stabilJson(fjern);
      return true;
    }
    if ((fjern.oppdatert || '') > (lokal.oppdatert || '')) {
      kunder[kunder.indexOf(lokal)] = fjern;
      sky.snapshot.kunder[rad.id] = stabilJson(fjern);
      return true;
    }
    if (stabilJson(lokal) === stabilJson(fjern)) sky.snapshot.kunder[rad.id] = stabilJson(fjern);
    return false;
  }

  function skyMergeSelger(rad) {
    var lokal = selgerById(rad.id);
    if (rad.slettet) {
      delete (sky.snapshot.selgere)[rad.id];
      if (lokal) { selgere = selgere.filter(function (s) { return s.id !== rad.id; }); return true; }
      return false;
    }
    var fjern = rad.data;
    if (!lokal) {
      selgere.push(fjern);
      sky.snapshot.selgere[rad.id] = stabilJson(fjern);
      return true;
    }
    if ((fjern.oppdatert || fjern.opprettet || '') > (lokal.oppdatert || lokal.opprettet || '')) {
      selgere[selgere.indexOf(lokal)] = fjern;
      sky.snapshot.selgere[rad.id] = stabilJson(fjern);
      return true;
    }
    if (stabilJson(lokal) === stabilJson(fjern)) sky.snapshot.selgere[rad.id] = stabilJson(fjern);
    return false;
  }

  function skyPull(full) {
    if (!skyAktiv()) return Promise.resolve(false);
    var team = 'team=eq.' + encodeURIComponent(sky.teamkode);
    var siden = (!full && sky.sistPull) ? '&sist_endret=gt.' + encodeURIComponent(sky.sistPull) : '';
    return Promise.all([
      skyFetch('kunder?' + team + siden + '&order=sist_endret.asc'),
      skyFetch('selgere?' + team + siden + '&order=sist_endret.asc'),
      skyFetch('innhold?' + team + siden + '&order=sist_endret.asc'),
      skyFetch('team?kode=eq.' + encodeURIComponent(sky.teamkode))
    ]).then(function (res) {
      if (!res[3].length) {
        // Teamet er fjernet i backend — send enheten tilbake til onboarding.
        skyKobleFra();
        render();
        return false;
      }
      settTeamInfo(res[3][0]);
      var endret = false;
      res[0].forEach(function (rad) {
        if (skyMergeKunde(rad)) endret = true;
        if (rad.sist_endret > (sky.sistPull || '')) sky.sistPull = rad.sist_endret;
      });
      res[1].forEach(function (rad) {
        if (skyMergeSelger(rad)) endret = true;
        if (rad.sist_endret > (sky.sistPull || '')) sky.sistPull = rad.sist_endret;
      });
      if (res[2].length) {
        res[2].forEach(function (rad) {
          innholdRader[rad.id] = { id: rad.id, type: rad.type, data: rad.data, slettet: rad.slettet };
          if (rad.sist_endret > (sky.sistPull || '')) sky.sistPull = rad.sist_endret;
        });
        saveInnhold();
        byggInnholdLister();
        endret = true;
      }
      if (endret) {
        if (aktivSelgerId && !selgerById(aktivSelgerId)) setAktivSelger((selgere[0] || {}).id || null);
        save(); saveSelgere();
      }
      sky.sistSynk = new Date(); sky.feil = null;
      oppdaterSkyStatus();
      return endret;
    }).catch(function () {
      sky.feil = 'Får ikke kontakt med skyen — jobber lokalt og prøver igjen.';
      oppdaterSkyStatus();
      return false;
    });
  }

  function skyDiffRader() {
    var snap = sky.snapshot || { kunder: {}, selgere: {} };
    var rader = { kunder: [], selgere: [] };
    kunder.forEach(function (k) {
      if (snap.kunder[k.id] !== stabilJson(k)) rader.kunder.push({ id: k.id, team: sky.teamkode, data: k, slettet: false });
    });
    Object.keys(snap.kunder).forEach(function (id) {
      if (!kunder.some(function (k) { return k.id === id; })) rader.kunder.push({ id: id, team: sky.teamkode, data: JSON.parse(snap.kunder[id]), slettet: true });
    });
    selgere.forEach(function (s) {
      if (snap.selgere[s.id] !== stabilJson(s)) rader.selgere.push({ id: s.id, team: sky.teamkode, data: s, slettet: false });
    });
    Object.keys(snap.selgere).forEach(function (id) {
      if (!selgere.some(function (s) { return s.id === id; })) rader.selgere.push({ id: id, team: sky.teamkode, data: JSON.parse(snap.selgere[id]), slettet: true });
    });
    return rader;
  }

  function skyPlanleggPush(forsinkelse) {
    if (!skyAktiv() || !sky.snapshot) return;
    clearTimeout(sky.pushTimer);
    sky.pushTimer = setTimeout(skyPush, forsinkelse || 1200);
  }

  function skyPush() {
    if (!skyAktiv() || !sky.snapshot) return;
    if (sky.pusher) { sky.pushIgjen = true; return; }
    var rader = skyDiffRader();
    if (!rader.kunder.length && !rader.selgere.length) return;
    sky.pusher = true;
    // Lagrer via RPC med server-side konfliktvern (nyeste oppdatert vinner);
    // faller tilbake til vanlig upsert hvis databasen mangler funksjonen.
    function lagreRader(tabell, liste) {
      return skyRpc('lagre_' + tabell, { p_rader: liste }).catch(function () {
        return skyFetch(tabell + '?on_conflict=id', { method: 'POST', prefer: 'resolution=merge-duplicates,return=minimal', body: liste });
      });
    }
    var jobber = [];
    if (rader.kunder.length) jobber.push(lagreRader('kunder', rader.kunder));
    if (rader.selgere.length) jobber.push(lagreRader('selgere', rader.selgere));
    Promise.all(jobber).then(function () {
      rader.kunder.forEach(function (r) {
        if (r.slettet) delete sky.snapshot.kunder[r.id];
        else sky.snapshot.kunder[r.id] = stabilJson(r.data);
      });
      rader.selgere.forEach(function (r) {
        if (r.slettet) delete sky.snapshot.selgere[r.id];
        else sky.snapshot.selgere[r.id] = stabilJson(r.data);
      });
      sky.sistSynk = new Date(); sky.feil = null;
      oppdaterSkyStatus();
    }).catch(function () {
      sky.feil = 'Får ikke lagret til skyen — prøver igjen om litt.';
      oppdaterSkyStatus();
      skyPlanleggPush(10000);
    }).then(function () {
      sky.pusher = false;
      if (sky.pushIgjen) { sky.pushIgjen = false; skyPlanleggPush(); }
    });
  }

  function skyForsiktigRender() {
    var el = document.activeElement;
    if (el && /^(input|textarea|select)$/i.test(el.tagName)) return;
    render();

  function skyKobleTil() {
    if (!skyAktiv()) return;
    sky.snapshot = { kunder: {}, selgere: {} };
    sky.sistPull = null;
    skyPull(true).then(function (endret) {
      skyPush();
      if (endret) skyForsiktigRender();
    });
    clearInterval(sky.pollTimer);
    sky.pollTimer = setInterval(function () {
      skyPull(false).then(function (endret) { if (endret) skyForsiktigRender(); });
    }, 25000);
  }

    clearInterval(sky.pollTimer);

    sky.teamkode = ''; sky.team = null; sky.snapshot = null; sky.sistPull = null; sky.sistSynk = null; sky.feil = null;

  // ---------- Helpers ----------
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function addDaysStr(n) {
    var d = new Date();
    d.setDate(d.getDate() + n);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function addMonthsStr(n) {
    var d = new Date();
    d.setMonth(d.getMonth() + n);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function fmtKort(n) {
    if (n == null || isNaN(n)) return '0';
    var abs = Math.abs(n);
    if (abs >= 1000000) return (n / 1000000).toLocaleString('nb-NO', { maximumFractionDigits: 1 }) + ' mill';
    if (abs >= 1000) return Math.round(n / 1000) + 'k';
    return String(Math.round(n));
  }
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function truncate(str, n) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n).trim() + '…' : str;
  }
  var MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  function formatDateShort(isoDate) {
    if (!isoDate) return '';
    var today = todayStr();
    if (isoDate === today) return 'I dag';
    var diffDays = Math.round((new Date(isoDate) - new Date(today)) / 86400000);
    if (diffDays === -1) return 'I går';
    if (diffDays === 1) return 'I morgen';
    var parts = isoDate.split('-');
    return parseInt(parts[2], 10) + '. ' + MONTHS[parseInt(parts[1], 10) - 1];
  }
  function formatDateTime(iso) {
    var d = new Date(iso);
    return d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear() + ' kl. ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  function fmtBelop(n) {
    if (n == null || isNaN(n)) return '';
    var abs = Math.abs(n);
    if (abs >= 1000000) return (n / 1000000).toLocaleString('nb-NO', { maximumFractionDigits: 1 }) + ' mill kr';
    return Math.round(n).toLocaleString('nb-NO') + ' kr';
  }

  // ---------- CRUD ----------

  // ---------- Tilfeldig firma-generator ----------
  function adresseStr(enhet) {
    var adr = enhet.forretningsadresse || enhet.postadresse;
    return adr ? [(adr.adresse || []).join(' '), adr.postnummer, adr.poststed].filter(Boolean).join(', ') : '';
  }
  // Standardkriterier for hvilke firmaer som er verdt å ringe. Kan
  // overstyres per team i backend (brreg_kriterier-kolonnen i team-tabellen).
  // - MVA-registrert = reell omsetning (minst 50 000 kr) — luker bort sovende firma
  // - 1–20 ansatte = eieren tar telefonen, ingen sentralbord/markedsavdeling
  // - minst 1 år gammelt = etablert økonomi
  // - AS/ENK = kjøpsdyktige selskapsformer der fradragsargumentet treffer
  // - kunMedTelefon = hopp over firmaer uten nummer i registeret (tidstyven)
  var BRREG_KRITERIER_STANDARD = { mvaRegistrert: true, minAnsatte: 1, maksAnsatte: 20, minAlderAar: 1, orgformer: ['AS', 'ENK'], kunMedTelefon: true };
  function brregKriterier() {
    return (sky.team && sky.team.kriterier) || BRREG_KRITERIER_STANDARD;
  }
  function brregParams(sted, bransjeKode) {
    var kr = brregKriterier();
    var params = 'underAvvikling=false&underKonkursbehandling=false&underTvangsavviklingEllerTvangsopplosning=false';
    if (kr.mvaRegistrert) params += '&registrertIMvaregisteret=true';
    if (kr.minAnsatte != null) params += '&fraAntallAnsatte=' + encodeURIComponent(kr.minAnsatte);
    if (kr.maksAnsatte != null) params += '&tilAntallAnsatte=' + encodeURIComponent(kr.maksAnsatte);
    if (kr.orgformer && kr.orgformer.length) params += '&organisasjonsform=' + encodeURIComponent(kr.orgformer.join(','));
    if (kr.minAlderAar) {
      var d = new Date();
      d.setFullYear(d.getFullYear() - kr.minAlderAar);
      params += '&tilRegistreringsdatoEnhetsregisteret=' + d.toISOString().slice(0, 10);
    }
    if (sted) params += '&forretningsadresse.poststed=' + encodeURIComponent(sted.toUpperCase());
    if (bransjeKode) params += '&naeringskode=' + encodeURIComponent(bransjeKode);
    return params;
  }
  function enhetTelefon(enhet) {
    return (enhet.telefon || enhet.mobiltelefon || '').toString().trim();
  }
  // ---------- Dagsmål og backup-vakt ----------
  // Dagsmålene styres av teamet i backend (team-tabellen); dette er kun
  // fallback-verdier for lokal modus og før første synk.
  var maal = { samtaler: 20, kroner: 10000 };
  var BACKUP_KEY = 'ringeliste_siste_backup_v1';
  function trengerBackup() {
    if (kunder.length < 10) return false;
    var sist = localStorage.getItem(BACKUP_KEY);
    return !sist || sist < addDaysStr(-7);
  }

  // ---------- Fyll ringelista (bulk-generator) ----------
  var GEN_PREFS_KEY = 'ringeliste_gen_prefs_v1';
  function loadGenPrefs() {
    try { return JSON.parse(localStorage.getItem(GEN_PREFS_KEY)) || {}; } catch (e) { return {}; }
  }
  function saveGenPrefs(p) {
    try { localStorage.setItem(GEN_PREFS_KEY, JSON.stringify(p)); } catch (e) {}
  }

  function hentFlereFirmaer(sted, bransjeKode, antall, onDone, onError) {
    var params = brregParams(sted, bransjeKode);
    fetch('https://data.brreg.no/enhetsregisteret/api/enheter?' + params + '&size=1&page=0')
      .then(function (res) { if (!res.ok) throw new Error('feil'); return res.json(); })
      .then(function (data) {
        var total = (data.page && data.page.totalElements) || 0;
        if (!total) { onError('Ingen treff med disse filtrene. Prøv et annet sted eller en annen bransje.'); return; }
        var maxIndex = Math.min(total, 10000);
        var totalPages = Math.max(1, Math.ceil(maxIndex / 20));
        var kr = brregKriterier();
        var pages = [];
        var tries = 0;
        // Telefonfilteret forkaster en del treff, så vi prøver flere sider.
        while (pages.length < Math.min(12, totalPages) && tries < 80) {
          var pg = Math.floor(Math.random() * totalPages);
          if (pages.indexOf(pg) === -1) pages.push(pg);
          tries++;
        }
        var collected = [];
        function hentSide(idx) {
          if (collected.length >= antall || idx >= pages.length) {
            if (!collected.length) onError('Fant ingen nye firmaer som oppfyller kriteriene (bl.a. registrert telefonnummer). Prøv et annet sted eller en annen bransje.');
            else onDone(collected.slice(0, antall));
            return;
          }
          fetch('https://data.brreg.no/enhetsregisteret/api/enheter?' + params + '&size=20&page=' + pages[idx])
            .then(function (res) { if (!res.ok) throw new Error('feil'); return res.json(); })
            .then(function (d) {
              var enheter = (d._embedded && d._embedded.enheter) || [];
              enheter.forEach(function (e) {
                if (collected.length >= antall) return;
                if (kr.kunMedTelefon && !enhetTelefon(e)) return;
                var dup = kunder.some(function (k) { return k.orgnr && e.organisasjonsnummer && k.orgnr === e.organisasjonsnummer; }) ||
                  collected.some(function (c) { return c.organisasjonsnummer === e.organisasjonsnummer; });
                if (!dup) collected.push(e);
              });
              hentSide(idx + 1);
            })
            .catch(function () { hentSide(idx + 1); });
        }
        hentSide(0);
      })
      .catch(function () { onError('Fikk ikke kontakt med Brønnøysundregisteret. Sjekk internett.'); });
  }

  function fyllRingeliste(orgId, sted, bransjeKode, btnEl) {
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Henter firmaer …'; }
    saveGenPrefs({ orgId: orgId || '', sted: sted || '', bransje: bransjeKode || '' });
    hentFlereFirmaer(sted, bransjeKode, 10, function (enheter) {
      var kandidater = enheter.map(function (e) {
        return nyKundeObjekt({ firma: e.navn || '', orgnr: e.organisasjonsnummer || '', adresse: adresseStr(e), telefon: enhetTelefon(e), kilde: 'ny', organisasjonId: orgId || null, status: 'ikke_kontaktet', firmainfo: firmainfoFraEnhet(e, false) });
      });
      if (skyAktiv()) {
        // Sentral duplikatkontroll: databasen hopper over org.nr teamet
        // allerede har, og reserverer resten til denne selgeren.
        skyRpc('importer_firmaer', { p_team: sky.teamkode, p_selger: aktivSelgerId, p_firmaer: kandidater })
          .then(function (rader) { skyTaImotRader(rader || []); })
          .catch(function () { kandidater.forEach(function (k) { kunder.unshift(k); }); save(); })
          .then(function () { startRingemodus(); });
      } else {
        kandidater.forEach(function (k) { kunder.unshift(k); });
        save();
        startRingemodus();
      }
    }, function (msg) {
      alert(msg);
      if (btnEl) { btnEl.disabled = false; btnEl.textContent = 'Hent 10 nye firmaer'; }
    });
  }

  // ---------- Eksport ----------
  function csvEscape(val) {
    var s = String(val == null ? '' : val);
    if (/[;"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
  function exportJSON() {
    var payload = { kunder: kunder, organisasjoner: organisasjoner, generelleInnvendinger: generelleInnvendinger, skatteTips: skatteTips, selgere: selgere, eksportert: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    downloadBlob(blob, 'ringeliste-backup-' + todayStr() + '.json');
    try { localStorage.setItem(BACKUP_KEY, todayStr()); } catch (e) {}
  }
  function exportCSV() {
    var headers = ['Bedrift','Kontaktperson','Telefon','E-post','Org.nr','Adresse','Kilde','Organisasjon','Selger','Status','Neste oppfolging','Antall kjop','Totalt kjopt (kr)','Siste notat'];
    var rows = kunder.map(function (k) {
      var orgNavn = k.organisasjonId ? ((orgById(k.organisasjonId) || {}).navn || '') : '';
      return [k.firma, k.kontaktperson, k.telefon, k.epost, k.orgnr, k.adresse, k.kilde, orgNavn, k.eierId ? (selgerNavn(k.eierId) || 'Ukjent') : '', (STATUS[k.status] || {}).label || k.status, k.nesteOppfolging || '', (k.salg || []).length, sumSalg(k), (k.notater[0] || {}).tekst || ''];
    });
    var all = [headers].concat(rows);
    var csv = all.map(function (r) { return r.map(csvEscape).join(';'); }).join('\r\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    downloadBlob(blob, 'ringeliste-' + todayStr() + '.csv');
    try { localStorage.setItem(BACKUP_KEY, todayStr()); } catch (e) {}
  }
  // ---------- Render: pieces ----------
  function kundeCard(k, showCallback) {
    var st = STATUS[k.status] || STATUS.ikke_kontaktet;
    var lastNote = k.notater[0];
    var navn = k.firma || k.kontaktperson || 'Uten navn';

    html += '<div class="card-top"><div class="card-name">' + esc(navn) + '</div><span class="badge" style="color:' + st.color + ';background:' + st.color + '1A">' + st.label + '</span></div>';
    if (k.firma && k.kontaktperson) html += '<div class="card-sub">' + esc(k.kontaktperson) + '</div>';
    if (k.organisasjonId) {
      var kOrg = orgById(k.organisasjonId);
      if (kOrg) html += '<div class="org-tag">' + esc(kOrg.navn) + '</div>';
    }
    if (k.eierId) {
      var eierN = selgerNavn(k.eierId) || 'Ukjent selger';
      html += '<div class="eier-tag">👤 ' + esc(eierN) + (k.eierId === aktivSelgerId ? ' (deg)' : '') + '</div>';
    } else {
      html += '<div class="pool-tag">I poolen</div>';
    }
    if (lastNote) html += '<div class="card-note">' + esc(truncate(lastNote.tekst, 80)) + '</div>';
    html += '<div class="card-bottom">';
    html += k.telefon ? '<a class="call-link" href="tel:' + esc(k.telefon.replace(/\s/g, '')) + '" onclick="event.stopPropagation()">' + phoneIcon() + ' ' + esc(k.telefon) + '</a>' : '<span></span>';
    html += (showCallback && k.nesteOppfolging) ? '<span class="callback-date">' + formatDateShort(k.nesteOppfolging) + '</span>' : '';
    html += '</div></div>';
    return html;
  }

  function orgOptions(selected) {
    var html = '<option value="">Ingen valgt</option>';
    html += organisasjoner.map(function (o) { return '<option value="' + esc(o.id) + '"' + (o.id === selected ? ' selected' : '') + '>' + esc(o.navn) + '</option>'; }).join('');

  // ---------- Firmainfo (fra Brønnøysundregisteret) ----------
  function firmainfoFraEnhet(enhet, full) {
    return {
      formaal: Array.isArray(enhet.vedtektsfestetFormaal) ? enhet.vedtektsfestetFormaal.join(' ') : (enhet.vedtektsfestetFormaal || ''),
      bransje: (enhet.naeringskode1 && enhet.naeringskode1.beskrivelse) || '',
      ansatte: (typeof enhet.antallAnsatte === 'number') ? enhet.antallAnsatte : null,

      hjemmeside: enhet.hjemmeside || '',
      hentet: full ? new Date().toISOString() : null
    };

  function hentFirmainfo(k) {
    if (!k || !k.orgnr) return;
    if (k.firmainfo && k.firmainfo.hentet) return;
    fetch('https://data.brreg.no/enhetsregisteret/api/enheter/' + encodeURIComponent(k.orgnr))
      .then(function (res) { if (!res.ok) throw new Error('feil'); return res.json(); })
      .then(function (enhet) {
        var gammel = k.firmainfo || {};
        k.firmainfo = firmainfoFraEnhet(enhet, true);
        if (gammel.omsetning != null) k.firmainfo.omsetning = gammel.omsetning;
        if (gammel.resultat != null) k.firmainfo.resultat = gammel.resultat;
        if (gammel.regnskapsAar) k.firmainfo.regnskapsAar = gammel.regnskapsAar;
        save();
        oppdaterFirmainfoBox(k);
        hentRegnskap(k);
      })
      .catch(function () {
        var box = document.getElementById('firmainfo-innhold');
        if (box && box.dataset.kunde === k.id && !k.firmainfo) {
          box.innerHTML = '<p class="empty-sub" style="margin:0;">Fikk ikke hentet firmainfo nå — bruk Google/Proff-lenkene.</p>';

      });
  }

  function hentRegnskap(k) {
    if (!k.orgnr || !k.firmainfo) return;
    if (k.firmainfo.omsetning != null) { return; }
    fetch('https://data.brreg.no/regnskapsregisteret/regnskap/' + encodeURIComponent(k.orgnr))
      .then(function (res) { if (!res.ok) throw new Error('feil'); return res.json(); })
      .then(function (data) {
        try {
          var r = Array.isArray(data) ? data[0] : ((data._embedded && data._embedded.regnskap) ? data._embedded.regnskap[0] : data);
          if (!r) return;
          var drift = (r.resultatregnskapResultat && r.resultatregnskapResultat.driftsresultat) || {};
          var oms = drift.driftsinntekter ? drift.driftsinntekter.sumDriftsinntekter : null;
          var dres = (typeof drift.driftsresultat === 'number') ? drift.driftsresultat : null;
          if (oms == null && dres == null) return;
          if (oms != null) k.firmainfo.omsetning = oms;
          if (dres != null) k.firmainfo.resultat = dres;
          if (r.regnskapsperiode && r.regnskapsperiode.tilDato) k.firmainfo.regnskapsAar = String(r.regnskapsperiode.tilDato).slice(0, 4);
          save();
          oppdaterFirmainfoBox(k);
        } catch (e) {}
      })
      .catch(function () {});
  }

  // ---------- Ringemodus ----------
  var TIPS_KATEGORIER = { salg: 'Salgsteknisk tips', skatt: 'Skattemessig tips', org: 'Organisasjonsinformasjon' };

  function tipsPool(kat, orgId) {
    var org = orgId ? orgById(orgId) : null;
    if (kat === 'skatt') return skatteTips.slice();
    if (kat === 'org') {
      var pool = [];
      if (org) {
        if (org.kortBeskrivelse) pool.push({ innvending: 'Hva ' + org.navn + ' gjør', tips: org.kortBeskrivelse });
        if (org.hvorfor) pool.push({ innvending: 'Derfor støtte ' + org.navn, tips: org.hvorfor });
        (org.fakta || []).forEach(function (f) { pool.push({ innvending: f.tittel, tips: f.tekst }); });
      }
      return pool;
    }
    var p = generelleInnvendinger.slice();
    if (org && org.innvendinger && org.innvendinger.length) p = p.concat(org.innvendinger);
    return p;
  }

  function nyttTips(orgId) {
    var pool = tipsPool(state.tipsKategori, orgId);
    if (!pool.length) { state.ringeTips = null; return; }
    var t = pool[Math.floor(Math.random() * pool.length)];
    if (state.ringeTips && pool.length > 1) {
      var guard = 0;
      while (t.innvending === state.ringeTips.innvending && guard < 5) {
        t = pool[Math.floor(Math.random() * pool.length)];
        guard++;
      }
    }
    state.ringeTips = t;
  }

  function byggRingeliste() {
    var today = todayStr();
    var mine = kunder.filter(function (k) { return tilgjengeligFor(k, aktivSelgerId); });
    var overdue = mine.filter(function (k) { return k.nesteOppfolging && k.nesteOppfolging < today; }).sort(function (a, b) { return a.nesteOppfolging.localeCompare(b.nesteOppfolging); });
    var dueToday = mine.filter(function (k) { return k.nesteOppfolging === today; });
    var fresh = mine.filter(function (k) { return !k.nesteOppfolging && k.status === 'ikke_kontaktet'; });
    var noAnswer = mine.filter(function (k) { return !k.nesteOppfolging && k.status === 'ingen_svar'; });
    return overdue.concat(dueToday, fresh, noAnswer).map(function (k) { return k.id; });
  }

  // Starter ringemodus. Med sky aktiv reserveres pool-kundene atomisk i
  // databasen (reserver_pool-RPC med radlåsing), så to selgere som trykker
  // samtidig aldri får de samme kundene. Uten nett faller vi tilbake til
  // lokal kø som før.
  function startRingemodus() {
    state.ringeIndex = 0; state.ringeTips = null; state.sisteUtfall = null;
    state.visRingTilbake = false; state.visSkatt = false; state.visSalg = false;
    function visKo() { state.view = 'ringe'; render(); window.scrollTo(0, 0); }
    if (skyAktiv()) {
      skyPush();
      var egne = byggRingeliste().filter(function (id) {
        var k = kunder.filter(function (x) { return x.id === id; })[0];
        return k && k.eierId === aktivSelgerId;
      });
      skyRpc('reserver_pool', { p_team: sky.teamkode, p_selger: aktivSelgerId, p_antall: 10, p_idag: todayStr() })
        .then(function (rader) {
          skyTaImotRader(rader || []);
          var poolIds = (rader || []).map(function (r) { return r.id; }).filter(function (id) { return egne.indexOf(id) === -1; });
          state.ringeQueue = egne.concat(poolIds);
          visKo();
        })
        .catch(function () {
          state.ringeQueue = byggRingeliste();
          reserverKo();
          visKo();
        });
    } else {
      state.ringeQueue = byggRingeliste();
      reserverKo();
      visKo();
    }
  }

  function registrerSalg(id, belop, mnd, notat) {
    var k = kunder.filter(function (x) { return x.id === id; })[0];
    if (!k) return;
    k.salg = k.salg || [];
    k.salg.push({ id: uid(), belop: belop || 0, dato: todayStr(), selgerId: aktivSelgerId });
    k.status = 'solgt';
    k.kilde = 'eksisterende';
    k.nesteOppfolging = addMonthsStr(mnd);
    k.reservertAv = null;
    if (aktivSelgerId) k.eierId = aktivSelgerId;
    var tekst = 'Solgt for ' + fmtBelop(belop || 0) + '. Ny kontakt om ' + mnd + ' mnd.';
    if (notat) tekst += ' — ' + notat;
    k.notater.unshift({ id: uid(), dato: new Date().toISOString(), tekst: tekst, selgerId: aktivSelgerId });
    k.oppdatert = new Date().toISOString();
    save();
  }

  function slettSalg(kundeId, salgId) {
    var k = kunder.filter(function (x) { return x.id === kundeId; })[0];
    if (!k) return;
    k.salg = (k.salg || []).filter(function (s) { return s.id !== salgId; });

  function alleSalg() {
    var list = [];

      (k.salg || []).forEach(function (s) {
        list.push({ salgId: s.id, kundeId: k.id, navn: k.firma || k.kontaktperson || 'Uten navn', belop: s.belop || 0, dato: s.dato || '', selgerId: s.selgerId || null });

  function loggUtfall(id, status, nesteDato, notat) {
    var neste = nesteDato || '';
    if (!neste && status === 'ingen_svar') neste = addDaysStr(1);
    var label = (STATUS[status] || {}).label || status;
    addNotat(id, {
      tekst: notat ? label + ': ' + notat : 'Utfall: ' + label,
      nesteOppfolging: neste,
      status: status
    });
    var k = kunder.filter(function (x) { return x.id === id; })[0];
    if (k) oppdaterEierEtterUtfall(k, status);
  }

  function dagensStats() {
    var today = todayStr();
    var samtaler = 0, solgtKr = 0, solgtAntall = 0, nye = 0;
    kunder.forEach(function (k) {
      k.notater.forEach(function (n) { if (n.dato && n.dato.slice(0, 10) === today && n.selgerId === aktivSelgerId) samtaler++; });
      (k.salg || []).forEach(function (s) { if (s.dato === today && s.selgerId === aktivSelgerId) { solgtKr += s.belop || 0; solgtAntall++; } });
      if ((k.opprettet || '').slice(0, 10) === today && k.opprettetAv === aktivSelgerId) nye++;
    });
    return { samtaler: samtaler, solgtKr: solgtKr, solgtAntall: solgtAntall, nye: nye };
  }

  function renderRingeView() {
    var queue = state.ringeQueue || [];
    var i = state.ringeIndex || 0;
    var k = null;
    while (i < queue.length) {
      k = kunder.filter(function (x) { return x.id === queue[i]; })[0];
      if (k) break;
      i++;
    }
    state.ringeIndex = i;
    var html = '<div class="view view-ringe">';
    html += '<button type="button" class="back-btn" data-action="nav" data-view="dashboard">&larr; Avslutt ringemodus</button>';
    if (state.sisteUtfall) {
      html += '<div class="angre-bar"><span>Forrige: <strong>' + esc(state.sisteUtfall.navn) + '</strong> → ' + esc(state.sisteUtfall.label) + '</span><button type="button" data-action="angre-utfall">Angre</button></div>';
    }
    if (!queue.length || i >= queue.length || !k) {
      var s = dagensStats();
      html += '<div class="empty-state"><div style="font-size:44px;">🎉</div><p style="font-weight:600;font-size:17px;margin:8px 0 0;">Lista er ferdigringt!</p>';
      html += '<p class="empty-sub">I dag: ' + s.samtaler + ' samtaler · ' + esc(fmtBelop(s.solgtKr)) + ' solgt (' + s.solgtAntall + ') · ' + s.nye + ' nye kunder</p></div>';
      html += '<button type="button" class="btn btn-primary big-start" data-action="fyll-og-fortsett">📞 Hent 10 nye og fortsett</button>';
      html += '<button type="button" class="btn btn-secondary" data-action="nav" data-view="dashboard">Til forsiden</button>';
      html += '</div>';
      return html;
    }
    var st = STATUS[k.status] || STATUS.ikke_kontaktet;
    var navn = k.firma || k.kontaktperson || 'Uten navn';
    var pct = queue.length ? Math.round((i / queue.length) * 100) : 0;
    html += '<div class="ringe-progress">Kunde ' + (i + 1) + ' av ' + queue.length + '</div>';
    html += '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>';

    html += '<div class="ringe-card">';
    html += '<div class="card-top"><div class="ringe-name">' + esc(navn) + '</div><span class="badge" style="color:' + st.color + ';background:' + st.color + '1A">' + st.label + '</span></div>';

    if (kOrg) html += '<div class="org-tag">' + esc(kOrg.navn) + '</div>';
    if (k.eierId === aktivSelgerId && k.eierId) html += '<div class="eier-tag">👤 Din kunde</div>';
    else if (!k.eierId) html += '<div class="pool-tag">Fra poolen — blir din ved salg eller oppfølging</div>';

  function salgChartHtml(salg) {
    var perDag = {};
    for (var i = 13; i >= 0; i--) perDag[addDaysStr(-i)] = 0;
    salg.forEach(function (s) { if (perDag[s.dato] !== undefined) perDag[s.dato] += s.belop; });
    var dager = Object.keys(perDag);
    var max = 0;
    dager.forEach(function (d) { if (perDag[d] > max) max = perDag[d]; });
    if (!max) return '<p class="empty-sub" style="margin:0;">Ingen salg siste 14 dager ennå — de dukker opp her.</p>';
    var today = todayStr();
    var maxDag = dager.filter(function (d) { return perDag[d] === max; })[0];
    return '<div class="chart-row">' + dager.map(function (d, idx) {
      var sum = perDag[d];
      var pct = max ? Math.round(sum / max * 100) : 0;
      var visVerdi = (d === maxDag && sum > 0) || (d === today && sum > 0 && d !== maxDag);
      var visLabel = idx === 0 || idx === 13 || d === today;
      var lab = d === today ? 'I dag' : (parseInt(d.slice(8), 10) + '.' + parseInt(d.slice(5, 7), 10));
      var bar = sum > 0
        ? '<div class="chart-bar" style="height:' + Math.max(pct, 3) + '%"></div>'
        : '<div class="chart-bar-zero"></div>';
      return '<div class="chart-col" title="' + esc(formatDateShort(d)) + ': ' + esc(fmtBelop(sum)) + '">' +
        '<div class="chart-val">' + (visVerdi ? esc(fmtKort(sum)) : '') + '</div>' +
        '<div class="chart-barwrap">' + bar + '</div>' +
        '<div class="chart-lab">' + (visLabel ? esc(lab) : '') + '</div>' +
        '</div>';
    }).join('') + '</div>';
  }

  function renderSalgView() {

    var snitt = salg.length ? Math.round(total / salg.length) : 0;

    html += '<div class="panel"><h2 class="panel-title">' + (mineVisning ? 'Dine kunder — gjensalg' : 'Alle kunder — gjensalg') + '</h2>';
    html += '<p class="empty-sub" style="margin:0 0 8px;">Alle som har kjøpt. De ringes automatisk opp igjen når datoen kommer.</p>';

      var sortert = salgsKunder.slice().sort(function (a, b) {

          '<div style="min-width:0;"><div style="font-weight:600;">' + esc(k.firma || k.kontaktperson || 'Uten navn') + '</div>' +
          '<div style="font-size:12px;color:var(--ink-muted);">' + (k.salg.length) + ' kjøp' + (k.nesteOppfolging ? ' · ringes ' + esc(formatDateShort(k.nesteOppfolging)) : '') + '</div></div>' +

      }).join('');
    } else {
      html += '<p class="empty-sub">Ingen kunder ennå — de kommer når du trykker 🎉 Solgt!</p>';
    }
    html += '</div>';

    html += '<div class="panel"><h2 class="panel-title">Salgslogg</h2>';
    if (salg.length) {
      html += salg.map(function (s) {
        var selgerInfo = !mineVisning && s.selgerId ? ' · ' + esc(selgerNavn(s.selgerId) || 'Ukjent selger') : '';

          '<div style="font-size:12px;color:var(--ink-muted);">' + esc(formatDateShort(s.dato)) + ' (' + esc(s.dato) + ')' + selgerInfo + '</div></div>' +

          '<button type="button" class="innvending-del" style="padding:0;" data-action="slett-salg" data-id="' + esc(s.salgId) + '" data-kunde="' + esc(s.kundeId) + '">Fjern</button></div></div>';
      }).join('');
    } else {
      html += '<p class="empty-sub">Hvert salg logges her med dato og beløp.</p>';
    }
    html += '</div></div>';
    return html;
  }

  function filteredKunder() {
    var list = kunder;
    if (state.eierFilter === 'mine') list = list.filter(function (k) { return k.eierId === aktivSelgerId; });
    else if (state.eierFilter === 'pool') list = list.filter(function (k) { return !k.eierId; });
    else if (state.eierFilter === 'andre') list = list.filter(function (k) { return k.eierId && k.eierId !== aktivSelgerId; });
    if (state.filter.indexOf('status:') === 0) {
      var st = state.filter.slice(7);
      list = list.filter(function (k) { return k.status === st; });
    }
    if (state.orgFilter) list = list.filter(function (k) { return k.organisasjonId === state.orgFilter; });
    if (state.search.trim()) {
      var q = state.search.trim().toLowerCase();
      var qDigits = q.replace(/\s/g, '');
      list = list.filter(function (k) {
        return (k.firma || '').toLowerCase().indexOf(q) !== -1 ||
          (k.kontaktperson || '').toLowerCase().indexOf(q) !== -1 ||
          (k.telefon || '').replace(/\s/g, '').indexOf(qDigits) !== -1;
      });
    }
    return list.slice().sort(function (a, b) { return (b.oppdatert || '').localeCompare(a.oppdatert || ''); });
  }

  function renderNav() {
    var tabs = [{ view: 'dashboard', label: 'I dag' }, { view: 'list', label: 'Kunder' }, { view: 'salg', label: 'Salg' }];
    return '<nav class="bottomnav">' + tabs.map(function (t) { var active = state.view === t.view || (t.view === 'list' && (state.view === 'add' || state.view === 'detail')); return '<button type="button" class="navtab ' + (active ? 'navtab-active' : '') + '" data-action="nav" data-view="' + t.view + '">' + t.label + '</button>'; }).join('') + '</nav>';
  }

  function render() {
    var app = document.getElementById('app');
    // Team-gate: uten gyldig teamkode og valgt selger kommer ingen inn.
    if (skyKonfigurert()) {
      if (!sky.teamkode) {
        app.innerHTML = renderHeader(true) + renderOnboardingTeam();
        afterRender();
        return;
      }
      if (!aktivSelger()) {
        app.innerHTML = renderHeader(true) + renderOnboardingSelger();
        afterRender();
        return;
      }
    } else if (!selgere.length) {
      state.view = 'selger';
    }
    var html = renderHeader();
    if (state.view === 'selger') html += renderSelgerView();
    else if (state.view === 'dashboard') html += renderDashboard();
    else if (state.view === 'salg') html += renderSalgView();
    else if (state.view === 'ringe') html += renderRingeView();
    else if (state.view === 'list') html += renderListView();
    else if (state.view === 'detail') html += renderDetailView(state.selectedId);
    else if (state.view === 'add') html += renderAddView();
    html += renderNav();
    app.innerHTML = html;
    afterRender();
  }

  function afterRender() {
    var fiKunde = null;
    if (state.view === 'ringe') {
      var fiQid = (state.ringeQueue || [])[state.ringeIndex];
      fiKunde = kunder.filter(function (x) { return x.id === fiQid; })[0];
    } else if (state.view === 'detail') {
      fiKunde = kunder.filter(function (x) { return x.id === state.selectedId; })[0];
    }
    if (fiKunde) hentFirmainfo(fiKunde);
    var searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', function () {
        state.search = this.value;
        updateListResults();
      });
    }
    var firmaInput = document.getElementById('f-firma');
    if (firmaInput) {
      var timer;
      firmaInput.addEventListener('input', function () {
        clearTimeout(timer);
        var val = this.value;
        if (val.trim().length < 3) {
          var box = document.getElementById('brreg-suggestions');
          if (box) box.innerHTML = '';
          return;
        }
        timer = setTimeout(function () { searchBrregLive(val); }, 400);
      });
    }
    var onboardKode = document.getElementById('onboard-kode');
    if (onboardKode && !state.onboardHenter) onboardKode.focus();
    var orgFilterSelect = document.getElementById('org-filter-select');
    if (orgFilterSelect) {
      orgFilterSelect.addEventListener('change', function () {
        state.orgFilter = this.value;
        updateListResults();
      });
    }
    var eierFilterSelect = document.getElementById('eier-filter-select');
    if (eierFilterSelect) {
      eierFilterSelect.addEventListener('change', function () {
        state.eierFilter = this.value;
        updateListResults();
      });
    }
    var fyllOrgSelect = document.getElementById('fyll-org');
    if (fyllOrgSelect) {
      fyllOrgSelect.addEventListener('change', function () {
        var badgeBox = document.getElementById('fyll-anbefalte');
        if (badgeBox) badgeBox.innerHTML = anbefalteNaerBadges(this.value);
      });
    }
  }

  // ---------- Events ----------
  function onClick(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.dataset.action;
    var id = el.dataset.id;

    if (action === 'nav') {
      // Reservasjonene beholdes når man forlater ringemodus — køen er
      // selgerens i 30 minutter (reservertTil), så den overlever både
      // fanebytte og selgerbytte, og «Start ringing» henter den tilbake.
      if (state.view === 'ringe') { state.ringeQueue = []; state.ringeIndex = 0; }
      state.view = el.dataset.view; state.selectedId = null;
      state.search = ''; state.filter = 'all'; state.orgFilter = ''; state.eierFilter = '';
      state.visRingTilbake = false; state.visSkatt = false; state.ringeTips = null;
      state.visSalg = false; state.salgMnd = 12; state.sisteUtfall = null;
      render();
    } else if (action === 'start-ringemodus') {
      startRingemodus();
    } else if (action === 'bytt-selger') {
      setAktivSelger(id);
      state.ringeQueue = []; state.ringeIndex = 0; state.sisteUtfall = null;
      render();
    } else if (action === 'delete-selger') {
      var dSelger = selgerById(id);
      if (dSelger && confirm('Slette selgeren ' + selgerNavn(id) + '? Kundene deres legges tilbake i poolen. Salgsloggen beholdes.')) {
        selgere = selgere.filter(function (s) { return s.id !== id; });
        saveSelgere();
        var frigitt = false;
        kunder.forEach(function (k) {
          if (k.eierId === id) { k.eierId = null; frigitt = true; }
          if (k.reservertAv === id) { k.reservertAv = null; frigitt = true; }
        });
        if (frigitt) save();
        if (aktivSelgerId === id) setAktivSelger((selgere[0] || {}).id || null);
        render();
      }
    } else if (action === 'salg-visning') {
      state.salgVisning = el.dataset.visning; render();
    } else if (action === 'utfall') {
      var whenDays = el.dataset.when;
      var nesteDato = whenDays !== undefined ? addDaysStr(parseInt(whenDays, 10)) : '';
      var noteEl = document.getElementById('utfall-notat');
      if (el.dataset.context === 'ringe') {
        var utfK = kunder.filter(function (x) { return x.id === id; })[0];
        if (utfK) state.sisteUtfall = snapshotUtfall(utfK, (STATUS[el.dataset.status] || {}).label || el.dataset.status);
      }
      loggUtfall(id, el.dataset.status, nesteDato, noteEl ? noteEl.value.trim() : '');
      state.visRingTilbake = false; state.visSalg = false;
      if (el.dataset.context === 'ringe') { state.ringeIndex++; state.ringeTips = null; state.visSkatt = false; render(); window.scrollTo(0, 0); }
      else { render(); }
    } else if (action === 'vis-ring-tilbake') {
      state.visRingTilbake = !state.visRingTilbake; state.visSalg = false; render();
    } else if (action === 'vis-salg') {
      state.visSalg = !state.visSalg; state.visRingTilbake = false; render();
      var belopInput = document.getElementById('salg-belop');
      if (belopInput) belopInput.focus();
    } else if (action === 'salg-mnd') {
      state.salgMnd = parseInt(el.dataset.mnd, 10) || 12;
      document.querySelectorAll('[data-action="salg-mnd"]').forEach(function (c) {
        c.classList.toggle('chip-active', c === el);
      });
    } else if (action === 'lagre-salg') {
      var belopEl = document.getElementById('salg-belop');
      var belop = belopEl ? Number(belopEl.value) || 0 : 0;
      var salgNotatEl = document.getElementById('utfall-notat');
      if (el.dataset.context === 'ringe') {
        var salgK = kunder.filter(function (x) { return x.id === el.dataset.id; })[0];
        if (salgK) state.sisteUtfall = snapshotUtfall(salgK, 'Solgt ' + fmtBelop(belop));
      }
      registrerSalg(el.dataset.id, belop, state.salgMnd || 12, salgNotatEl ? salgNotatEl.value.trim() : '');
      state.visSalg = false; state.salgMnd = 12; state.visRingTilbake = false;
      if (el.dataset.context === 'ringe') { state.ringeIndex++; state.ringeTips = null; render(); window.scrollTo(0, 0); }
      else { render(); }
    } else if (action === 'slett-salg') {
      if (confirm('Fjerne dette salget fra loggen?')) { slettSalg(el.dataset.kunde, id); render(); }
    } else if (action === 'hopp-over') {
      // «Utsett til i morgen»: slipp reservasjonen OG flytt oppfølgingen til
      // i morgen — ellers er kunden eneste kandidat igjen og kommer rett
      // tilbake i køen ved neste «Start ringing».
      var skipId = (state.ringeQueue || [])[state.ringeIndex];
      var skipK = kunder.filter(function (x) { return x.id === skipId; })[0];
      if (skipK) {
        skipK.reservertAv = null;
        skipK.reservertTil = null;
        skipK.nesteOppfolging = addDaysStr(1);
        skipK.oppdatert = new Date().toISOString();
        save();
      }
      state.ringeIndex++; state.ringeTips = null; state.visRingTilbake = false; state.visSkatt = false; state.visSalg = false; render(); window.scrollTo(0, 0);
    } else if (action === 'ringe-nytt-tips') {
      var qId = (state.ringeQueue || [])[state.ringeIndex];
      var qK = kunder.filter(function (x) { return x.id === qId; })[0];
      nyttTips(qK ? (qK.organisasjonId || '') : '');
      render();
    } else if (action === 'tips-kat') {
      state.tipsKategori = el.dataset.kat;
      state.ringeTips = null;
      var qId2 = (state.ringeQueue || [])[state.ringeIndex];
      var qK2 = kunder.filter(function (x) { return x.id === qId2; })[0];
      nyttTips(qK2 ? (qK2.organisasjonId || '') : '');
      render();
    } else if (action === 'fyll-liste') {
      var fyllOrg = document.getElementById('fyll-org');
      var fyllSted = document.getElementById('fyll-sted');
      var fyllBransje = document.getElementById('fyll-bransje');
      fyllRingeliste(fyllOrg ? fyllOrg.value : '', fyllSted ? fyllSted.value.trim() : '', fyllBransje ? fyllBransje.value : '', el);
    } else if (action === 'fyll-og-fortsett') {
      var prefs = loadGenPrefs();
      fyllRingeliste(prefs.orgId || (organisasjoner[0] || {}).id || '', prefs.sted || '', prefs.bransje || '', el);
    } else if (action === 'lagre-tlf') {
      var tlfInput = document.getElementById('ringe-tlf');
      var tlfVal = tlfInput ? tlfInput.value.trim() : '';
      if (tlfVal) { updateKunde(el.dataset.id, { telefon: tlfVal }); render(); }
    } else if (action === 'open-detail') {
      state.view = 'detail'; state.selectedId = id; render();
    } else if (action === 'velg-selger') {
      setAktivSelger(id);
      state.view = 'dashboard';
      render();
    } else if (action === 'back') {
      state.view = el.dataset.back || 'list'; render();
    } else if (action === 'delete-kunde') {
      var k = kunder.filter(function (x) { return x.id === id; })[0];
      if (k && confirm('Slette ' + (k.firma || k.kontaktperson || 'kunden') + '? Dette kan ikke angres.')) {
        deleteKunde(id); state.view = 'list'; render();
      }
    } else if (action === 'angre-utfall') {
      var su = state.sisteUtfall;
      if (su) {
        var angreK = kunder.filter(function (x) { return x.id === su.kundeId; })[0];
        if (angreK) {
          angreK.status = su.status;
          angreK.nesteOppfolging = su.nesteOppfolging;
          angreK.kilde = su.kilde;
          angreK.eierId = su.eierId;
          angreK.reservertAv = su.reservertAv;
          angreK.reservertTil = su.reservertTil;
          if (angreK.notater.length > su.notater) angreK.notater = angreK.notater.slice(angreK.notater.length - su.notater);
          if ((angreK.salg || []).length > su.salg) angreK.salg = angreK.salg.slice(0, su.salg);
          angreK.oppdatert = new Date().toISOString();
          save();
        }
        state.sisteUtfall = null;
        if (state.ringeIndex > 0) state.ringeIndex--;
        state.ringeTips = null; state.visRingTilbake = false; state.visSalg = false;
        render(); window.scrollTo(0, 0);
      }
    } else if (action === 'backup-naa') {
      exportJSON(); render();
    } else if (action === 'set-filter') {
      state.filter = el.dataset.filter; updateListResults();
    } else if (action === 'export-json') {
      exportJSON();
    } else if (action === 'export-csv') {
      exportCSV();
    } else if (action === 'koble-fra-team') {
      if (confirm('Koble fra teamet? Denne enheten tømmes lokalt, men alt ligger trygt i skyen på teamkoden.')) {
        skyKobleFra();
        state.view = 'dashboard';
        render();
      }
    } else if (action === 'pick-brreg') {
      var enhet = state.brregResults.filter(function (r) { return r.organisasjonsnummer === id; })[0];
      if (enhet) fillBrregIntoForm(enhet);
    }
  }

  function onSubmit(e) {
    e.preventDefault();
    var form = e.target;
    var action = form.dataset.action;
    var fd = new FormData(form);

    if (action === 'add-kunde') {
      var firma = (fd.get('firma') || '').toString().trim();
      var kontaktperson = (fd.get('kontaktperson') || '').toString().trim();
      if (!firma && !kontaktperson) { alert('Skriv inn minst bedriftsnavn eller kontaktperson.'); return; }
      var orgnrVal = (fd.get('orgnr') || '').toString().trim();
      var duplikat = kunder.filter(function (x) {
        return (orgnrVal && x.orgnr === orgnrVal) || (firma && (x.firma || '').trim().toLowerCase() === firma.toLowerCase());
      })[0];
      if (duplikat && !confirm('«' + (duplikat.firma || duplikat.kontaktperson) + '» ligger allerede i kundelista. Legge til likevel?')) return;
      var pendingFi = (state.pendingEnhet && state.pendingEnhet.organisasjonsnummer === orgnrVal && orgnrVal) ? firmainfoFraEnhet(state.pendingEnhet, false) : null;
      var k = addKunde({
        firma: firma, kontaktperson: kontaktperson,
        telefon: (fd.get('telefon') || '').toString().trim(),
        epost: (fd.get('epost') || '').toString().trim(),
        orgnr: orgnrVal,
        adresse: (fd.get('adresse') || '').toString().trim(),
        kilde: 'ny',
        organisasjonId: fd.get('organisasjonId') || null,
        firmainfo: pendingFi
      });
      state.pendingEnhet = null;
      state.view = 'detail'; state.selectedId = k.id; render();
    } else if (action === 'edit-kunde') {
      var nyEier = (fd.get('eierId') || '').toString() || null;
      var nyDato = (fd.get('nesteOppfolging') || '').toString() || null;
      if (!nyEier && nyDato && aktivSelgerId) nyEier = aktivSelgerId;
      updateKunde(form.dataset.id, {
        firma: (fd.get('firma') || '').toString().trim(),
        kontaktperson: (fd.get('kontaktperson') || '').toString().trim(),
        telefon: (fd.get('telefon') || '').toString().trim(),
        epost: (fd.get('epost') || '').toString().trim(),
        orgnr: (fd.get('orgnr') || '').toString().trim(),
        adresse: (fd.get('adresse') || '').toString().trim(),
        kilde: fd.get('kilde'),
        organisasjonId: fd.get('organisasjonId') || null,
        eierId: nyEier,
        nesteOppfolging: nyDato
      });
      render();
    } else if (action === 'onboard-team') {
      var kode = (fd.get('teamkode') || '').toString().trim().toLowerCase();
      if (!kode) { state.onboardFeil = 'Skriv inn teamkoden.'; render(); return; }
      state.onboardHenter = true; state.onboardFeil = null;
      render();
      skyFetch('team?kode=eq.' + encodeURIComponent(kode))
        .then(function (rader) {
          state.onboardHenter = false;
          if (!rader.length) {
            state.onboardFeil = 'Ukjent teamkode — sjekk med teamansvarlig.';
            render();
            return;
          }
          sky.teamkode = kode;
          try { localStorage.setItem(TEAM_STORAGE_KEY, kode); } catch (e) {}
          settTeamInfo(rader[0]);
          skyKobleTil();
          render(); // videre til «Hvem er du?» — selgerlista fylles av synken
        })
        .catch(function () {
          state.onboardHenter = false;
          state.onboardFeil = 'Fikk ikke kontakt — sjekk internettforbindelsen og prøv igjen.';
          render();
        });
    } else if (action === 'add-selger') {
      var sFornavn = (fd.get('fornavn') || '').toString().trim();
      var sEtternavn = (fd.get('etternavn') || '').toString().trim();
      if (!sFornavn) { alert('Skriv inn fornavn.'); return; }
      var nySelger = addSelger(sFornavn, sEtternavn);
      setAktivSelger(nySelger.id);
      state.ringeQueue = []; state.ringeIndex = 0; state.sisteUtfall = null;
      state.view = 'dashboard';
      render();
    } else if (action === 'edit-selger') {
      var eFornavn = (fd.get('fornavn') || '').toString().trim();
      if (!eFornavn) { alert('Skriv inn fornavn.'); return; }
      var eSelger = aktivSelger();
      if (eSelger) {
        eSelger.fornavn = eFornavn;
        eSelger.etternavn = (fd.get('etternavn') || '').toString().trim();
        eSelger.oppdatert = new Date().toISOString();
        saveSelgere();
      }
      render();
    }
  }

  // ---------- Init ----------
  load();
  if (skyKonfigurert()) {
    // Innhold og dagsmål styres i backend — last lokal cache fra forrige synk.
    loadInnhold();
    loadTeamInfo();
  } else {
    // Lokal modus (uten Supabase-nøkkel): innebygd standardinnhold.
    loadOrg();
    loadInnvendinger();
    loadSkatteTips();
  }
  loadSelgere();
  // Reservasjoner overlever omlasting med vilje: «Start ringing» henter
  // selgerens egne reserverte kunder tilbake, og alt utløper uansett
  // automatisk via reservertTil (30 min).
  try { sky.teamkode = (localStorage.getItem(TEAM_STORAGE_KEY) || '').trim().toLowerCase(); } catch (e) { sky.teamkode = ''; }
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && skyAktiv()) skyPull(false).then(function (endret) { if (endret) skyForsiktigRender(); });
  });
  if (skyAktiv()) skyKobleTil();
  var appEl = document.getElementById('app');
  appEl.addEventListener('click', onClick);
  appEl.addEventListener('submit', onSubmit);
  render();
})();
</script>
</body>
</html>
