<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eef1f5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Trening" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/app.css" />
  <title>Treningsapp v2</title>
</head>
<body>
  <!-- Liquid glass: distorsjonsfilter for lysbryting i glassflater.
       Refereres via filter: url(#glass-distortion); aktiveres kun i
       Chromium (klassen har-distorsjon) — Safari får blur/specular uten. -->
  <svg class="skjult-filter" aria-hidden="true" focusable="false">
    <filter id="glass-distortion" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.012 0.006" numOctaves="2" seed="7" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" />
    </filter>
  </svg>
  <div id="app">
    <div class="laster">Laster…</div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
