<!DOCTYPE html>
<html lang="no">

<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='22'%20fill='%230E6E6E'/%3E%3Ctext%20x='50'%20y='68'%20font-family='Arial'%20font-size='54'%20font-weight='700'%20fill='white'%20text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E">

<style>
:root {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --ink: #14171F;
  --ink-muted: #5B6472;
  --ink-faint: #828B96;
  --border: #E2E5EA;
  --brand: #0E6E6E;
  --overdue: #C0392B;
  --today: #C2750C;
  --st-new: #5B6472;
  --st-callback: #C2750C;
  --st-no: #94A0AE;
  --st-won: #15803D;
  --st-noanswer: #5B7FA6;
  --st-wrong: #8B5E5E;
  --radius: 12px;
  --radius-sm: 8px;
}
* , *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  min-height: 100vh;
}
#app { max-width: 600px; margin: 0 auto; }
.topbar { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 14px 20px 6px; }
.topbar-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--brand); }
.view { padding: 8px 16px 24px; }
.view-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; margin: 4px 0 16px; }
.hero { text-align: center; padding: 22px 0 18px; }
.hero-number { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 64px; line-height: 1; color: var(--ink); }
.hero-label { font-size: 14px; color: var(--ink-muted); margin-top: 4px; }
.section-label { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin: 18px 2px 8px; }
.section-label-overdue { color: var(--overdue); }
.section-label-today { color: var(--today); }
.card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--ink-faint); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; cursor: pointer; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-name { font-weight: 600; font-size: 15px; }
.card-sub { font-size: 13px; color: var(--ink-muted); margin-top: 2px; }
.card-note { font-size: 13px; color: var(--ink-muted); margin-top: 6px; line-height: 1.4; }
.card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; min-height: 20px; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
.call-link { display: inline-flex; align-items: center; gap: 6px; color: var(--brand); font-weight: 600; font-size: 14px; text-decoration: none; }
.call-link-big { background: var(--brand); color: #fff; padding: 13px 16px; border-radius: var(--radius-sm); justify-content: center; width: 100%; margin: 14px 0 6px; font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; }
.callback-date { font-size: 12px; color: var(--ink-faint); font-weight: 600; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-muted); }
.empty-sub { font-size: 13px; color: var(--ink-faint); margin: 4px 0 0; }
.search-input { width: 100%; font-size: 16px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); margin-bottom: 10px; }
.filter-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 4px; -webkit-overflow-scrolling: touch; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip { flex: 0 0 auto; font-size: 13px; font-weight: 500; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--ink-muted); }
.chip-active { background: var(--brand); border-color: var(--brand); color: #fff; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin: 0 0 12px; }
.panel-danger { border-color: #EAC4C0; }
.form-grid { display: flex; flex-direction: column; gap: 12px; }
label { display: block; font-size: 13px; color: var(--ink-muted); font-weight: 500; }
input, select, textarea { display: block; width: 100%; margin-top: 5px; font-size: 16px; font-family: inherit; color: var(--ink); padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fff; }
textarea { resize: vertical; min-height: 70px; }
input:focus, select:focus, textarea:focus, button:focus-visible, a:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }
.btn { display: block; width: 100%; text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; padding: 13px; border-radius: var(--radius-sm); border: none; margin-top: 14px; cursor: pointer; box-sizing: border-box; }
.btn-primary { background: var(--brand); color: #fff; }
.btn-secondary { background: #fff; color: var(--ink); border: 1px solid var(--border); }
.btn-danger { background: #fff; color: var(--overdue); border: 1px solid #EAC4C0; }
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { margin-top: 10px; }
.back-btn { background: none; border: none; color: var(--ink-muted); font-size: 14px; padding: 6px 0; margin-bottom: 6px; cursor: pointer; font-family: inherit; }
.detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
.note-entry { padding: 10px 0; border-top: 1px solid var(--border); }
.note-entry:first-child { border-top: none; padding-top: 0; }
.note-date { font-size: 12px; color: var(--ink-faint); font-weight: 600; margin-bottom: 3px; }
.note-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
.proff-row { margin: 2px 0 0; }
.link-btn { font-size: 13px; color: var(--brand); text-decoration: none; font-weight: 600; }
.brreg-loading, .brreg-empty { font-size: 12px; color: var(--ink-faint); padding: 8px 2px; }
.brreg-item { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; margin-top: 6px; cursor: pointer; font-family: inherit; }
.brreg-item strong { font-size: 13px; }
.brreg-item span { font-size: 12px; color: var(--ink-muted); }
.import-list { max-height: 220px; overflow-y: auto; margin: 10px 0; }
.import-row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.stats-grid { display: flex; gap: 10px; }
.stat { flex: 1; text-align: center; }
.stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
.bottomnav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; display: flex; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); max-width: 600px; margin: 0 auto; }
.navtab { flex: 1; background: none; border: none; padding: 8px 4px; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: var(--ink-faint); cursor: pointer; border-radius: 8px; }
.navtab-active { color: var(--brand); background: rgba(14,110,110,0.08); }
.org-tag { font-size: 11px; color: var(--brand); font-weight: 600; margin-top: 2px; }
.filter-select { width: auto; font-size: 13px; padding: 9px 11px; margin-bottom: 10px; }
.reveal-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 10px 0; }
.reveal-label { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-muted); margin-bottom: 8px; }
.reveal-content p { margin: 0 0 8px; font-size: 14px; line-height: 1.5; }
.reveal-content p:last-child { margin-bottom: 0; }
.reveal-content strong { color: var(--brand); }
.innvending-item { padding: 10px 0; border-top: 1px solid var(--border); }
.innvending-item:first-child { border-top: none; padding-top: 0; }
.innvending-q { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
.innvending-a { font-size: 13px; color: var(--ink-muted); line-height: 1.4; }
.innvending-del { background: none; border: none; color: var(--overdue); font-size: 12px; padding: 6px 0 0; cursor: pointer; font-family: inherit; }
.org-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; cursor: pointer; }
.org-card-name { font-weight: 600; font-size: 15px; }
.org-card-desc { font-size: 13px; color: var(--ink-muted); margin-top: 3px; line-height: 1.4; }
.org-card-count { font-size: 11px; color: var(--ink-faint); margin-top: 6px; }
.tax-fact p { margin: 0 0 8px; font-size: 13px; line-height: 1.5; }
.tax-fact p:last-child { margin-bottom: 0; }
.generator-result { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin: 10px 0 0; }
.generator-result-name { font-weight: 600; font-size: 14px; }
.generator-result-addr { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'ringeliste_kunder_v1';

  var STATUS = {
    ikke_kontaktet: { label: 'Ikke kontaktet', color: '#5B6472' },
    ring_tilbake:   { label: 'Ring tilbake',    color: '#C2750C' },
    ingen_svar:     { label: 'Ingen svar',      color: '#5B7FA6' },
    solgt:          { label: 'Solgt',           color: '#15803D' },
    ikke_interessert:{ label: 'Ikke interessert', color: '#94A0AE' },
    feil_nummer:    { label: 'Feil nummer',     color: '#8B5E5E' }
  };
  var STATUS_ORDER = ['ikke_kontaktet','ring_tilbake','ingen_svar','solgt','ikke_interessert','feil_nummer'];

  var ORG_STORAGE_KEY = 'ringeliste_organisasjoner_v1';
  var INNV_STORAGE_KEY = 'ringeliste_generelle_innvendinger_v1';

  var BRANSJER = [
    { label: 'Alle bransjer', kode: '' },
    { label: 'Bygg og anlegg', kode: '41,42,43' },
    { label: 'Varehandel / butikk', kode: '47' },
    { label: 'Overnatting og servering', kode: '55,56' },
    { label: 'Helse- og omsorgstjenester', kode: '86,87' },
    { label: 'Personlig tjenesteyting (frisør mm.)', kode: '96' },
    { label: 'Eiendom', kode: '68' },
    { label: 'Regnskap, revisjon, rådgivning', kode: '69,70' },
    { label: 'Transport og lager', kode: '49,52' },
    { label: 'Bilverksted og bilpleie', kode: '45.2' },
    { label: 'Industri og produksjon', kode: '10,25,28,31' },
    { label: 'Finans og forsikring', kode: '64,65,66' },
    { label: 'IT og teknologi', kode: '62,63' },
    { label: 'Kultur, idrett og fritid', kode: '90,93' }
  ];

  var TAX_HTML = '<p>Når en bedrift kjøper en støtteannonse og faktisk får en synlig annonseplass igjen, regner Skatteetaten dette som kjøp av en <strong>reklametjeneste</strong> — ikke en gave. Kostnaden er da fradragsberettiget som vanlig markedsføringskostnad (skatteloven § 6-1), <strong>uten tak</strong> — så lenge prisen står i rimelig forhold til hva annonseplassen faktisk er verdt i markedet.</p><p>Er beløpet klart høyere enn reklameverdien tilsier, regnes det overskytende som en gave. Gaver er normalt ikke fradragsberettiget, men for gaver til godkjente frivillige organisasjoner gjelder skatteloven § 6-50: fradrag for gaver til sammen inntil <strong>25 000 kr per år</strong> (krever minst 500 kr til hver organisasjon).</p><p>Praktisk for deg: så lenge annonsen er reell og prisen rimelig, er hele beløpet normalt fradragsberettiget som markedsføring — ikke begrenset av gavegrensen. Dette er generell informasjon, ikke individuell skatterådgivning — ved store beløp bør kunden sjekke med sin regnskapsfører.</p>';

  function defaultOrganisasjoner() {
    return [
      { id: 'org-naaf', navn: 'Astma- og Allergiforbundet', kortBeskrivelse: 'Pasient- og interesseorganisasjon for astma, allergi, eksem og kols. Rundt 1,5 millioner nordmenn er rammet av disse diagnosene. Driver blant annet den nasjonale pollenvarslingen, en rådgivningstjeneste og støtter forskning.', hvorfor: 'Astma og allergi rammer stadig flere barn — annonsen støtter informasjonsarbeid, rådgivning og forskning som hjelper familier direkte.', innvendinger: [], anbefalteNaeringer: ['Bygg og anlegg', 'Bilverksted og bilpleie', 'Helse- og omsorgstjenester', 'Industri og produksjon', 'Personlig tjenesteyting (frisør mm.)'] },
      { id: 'org-blakors', navn: 'Blå Kors', kortBeskrivelse: 'Ideell, diakonal organisasjon som arbeider mot rus- og spillavhengighet. Driver behandlingsinstitusjoner, forebygging for barn/unge og oppfølging etter behandling over store deler av Norge.', hvorfor: 'Rus rammer ikke bare den som sliter, men hele familien — Blå Kors jobber både med forebygging blant unge og behandling/oppfølging i etterkant.', innvendinger: [], anbefalteNaeringer: ['Overnatting og servering', 'Helse- og omsorgstjenester', 'Varehandel / butikk', 'Kultur, idrett og fritid', 'Personlig tjenesteyting (frisør mm.)'] },
      { id: 'org-rodekors', navn: 'Røde Kors', kortBeskrivelse: 'Norges største humanitære organisasjon. Driver blant annet hjelpekorps/redningstjeneste, besøkstjeneste, leksehjelp, flyktningarbeid og internasjonal nødhjelp.', hvorfor: 'Lokalt og internasjonalt — Røde Kors er ofte først på stedet ved ulykker og kriser, og bygger fellesskap året rundt gjennom lokale aktiviteter.', innvendinger: [], anbefalteNaeringer: ['Transport og lager', 'Bygg og anlegg', 'Finans og forsikring', 'Eiendom', 'Varehandel / butikk'] }
    ];
  }
  function defaultGenerelleInnvendinger() {
    return [
      { id: uid(), innvending: 'Åpn med et ja-spørsmål', tips: 'Start med: "Er du den som tar avgjørelser om markedsføring hos [firma]?" Det setter deg rett inn i riktig samtale og sparer tid på feil person.' },
      { id: uid(), innvending: 'Bruk firmanavnet aktivt', tips: 'Si firmanavnet tidlig og knytt det til formålet: "Vi ønsker at [firma] skal stå som en synlig støttespiller for [org] i dette området." Det gjør det konkret og personlig.' },
      { id: uid(), innvending: 'Gi en konkret størrelse tidlig', tips: 'Nevn beløpet og sammenlign det med noe kjent: "Vi snakker om en støtteannonse for [beløp] kr — omtrent det samme som én reklameannonse i lokalsavisa." Det gjør det lett å forholde seg til.' },
      { id: uid(), innvending: 'Knytt det til nærmiljøet', tips: '"Vi setter sammen en kampanje for [org] i dette distriktet, og leter etter lokale bedrifter som ønsker å bli synlige støttespillere." Lokal tilhørighet treffer mange bedriftseiere.' },
      { id: uid(), innvending: 'Trekk frem skattefradraget tidlig', tips: 'Fortell raskt at dette er fradragsberettiget som markedsføring — ikke gave. Det fjerner en vanlig skepsis og gjør at de ser det som en forretningsbeslutning, ikke veldedighet.' },
      { id: uid(), innvending: 'Ha organisasjonen på 20 sekunder klar', tips: 'Forbered én konkret setning: hva [org] gjør og hvem de hjelper. Tall funker bra: "Røde Kors rykker ut ved over 2 000 redningsaksjoner i Norge hvert år." Det skaper relevans raskt.' },
      { id: uid(), innvending: 'Spør om de støtter noe fra før', tips: '"Støtter dere allerede noen frivillige organisasjoner?" Svaret gir deg en inngang uansett hva de sier — og viser at du er interessert i dem, ikke bare i salget.' },
      { id: uid(), innvending: 'Avslutt alltid med neste steg', tips: 'Ikke avslutt uten et konkret neste steg: dato for tilbakering, e-post du sender, eller bekreftelse. "Kan jeg ringe deg igjen fredag kl. 10?" er mye sterkere enn "ok, tenk på det".' },
      { id: uid(), innvending: 'Bruk "vi" ikke "jeg"', tips: 'Si "vi jobber med" heller enn "jeg selger". Det signaliserer at du representerer noe større enn deg selv, og gir mer troverdighet i en kald samtale.' },
      { id: uid(), innvending: 'Tilpass åpningen til bransjen', tips: 'En bilverksted-eier tenker HMS og ansvarlig arbeidsliv — koble [org] til det. En restaurant-eier tenker lokalsamfunn og omdømme. Bruk "Anbefalte bransjer" under Org for konkrete innspill.' }
    ];
  }

  var organisasjoner = [];
  var generelleInnvendinger = [];
  var kunder = [];
  var state = { view: 'dashboard', selectedId: null, selectedOrgId: null, search: '', filter: 'all', orgFilter: '', importPreview: null, brregResults: [], genFirma: null, genInnvending: null, visInnvending: false };

  // ---------- Storage ----------
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      kunder = raw ? JSON.parse(raw) : [];
    } catch (e) { kunder = []; }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(kunder)); }
    catch (e) { alert('Kunne ikke lagre. Lagringsplassen kan være full.'); }
  }
  function loadOrg() {
    try {
      var raw = localStorage.getItem(ORG_STORAGE_KEY);
      if (raw) { organisasjoner = JSON.parse(raw); }
      else { organisasjoner = defaultOrganisasjoner(); saveOrg(); }
    } catch (e) { organisasjoner = defaultOrganisasjoner(); }
  }
  function saveOrg() {
    try { localStorage.setItem(ORG_STORAGE_KEY, JSON.stringify(organisasjoner)); } catch (e) {}
  }
  function loadInnvendinger() {
    try {
      var raw = localStorage.getItem(INNV_STORAGE_KEY);
      if (raw) { generelleInnvendinger = JSON.parse(raw); }
      else { generelleInnvendinger = defaultGenerelleInnvendinger(); saveInnvendinger(); }
    } catch (e) { generelleInnvendinger = defaultGenerelleInnvendinger(); }
  }
  function saveInnvendinger() {
    try { localStorage.setItem(INNV_STORAGE_KEY, JSON.stringify(generelleInnvendinger)); } catch (e) {}
  }

  // ---------- Helpers ----------
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function truncate(str, n) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n).trim() + '…' : str;
  }
  var MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  function formatDateShort(isoDate) {
    if (!isoDate) return '';
    var today = todayStr();
    if (isoDate === today) return 'I dag';
    var diffDays = Math.round((new Date(isoDate) - new Date(today)) / 86400000);
    if (diffDays === -1) return 'I går';
    if (diffDays === 1) return 'I morgen';
    var parts = isoDate.split('-');
    return parseInt(parts[2], 10) + '. ' + MONTHS[parseInt(parts[1], 10) - 1];
  }
  function formatDateTime(iso) {
    var d = new Date(iso);
    return d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear() + ' kl. ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  function phoneIcon() {

  // ---------- Tilfeldig firma-generator ----------
  function adresseStr(enhet) {
    var adr = enhet.forretningsadresse || enhet.postadresse;
    return adr ? [(adr.adresse || []).join(' '), adr.postnummer, adr.poststed].filter(Boolean).join(', ') : '';

  function showGeneratorError(msg) {
    var box = document.getElementById('generator-result');
    if (box) box.innerHTML = '<div class="brreg-empty">' + esc(msg) + '</div>';
  }
  function genererTilfeldigFirma() {
    var stedInput = document.getElementById('gen-sted');
    var bransjeSelect = document.getElementById('gen-bransje');
    var sted = stedInput ? stedInput.value.trim() : '';
    var bransjeKode = bransjeSelect ? bransjeSelect.value : '';
    var params = 'underAvvikling=false&underKonkursbehandling=false';
    if (sted) params += '&forretningsadresse.poststed=' + encodeURIComponent(sted.toUpperCase());
    if (bransjeKode) params += '&naeringskode=' + encodeURIComponent(bransjeKode);

    var box = document.getElementById('generator-result');
    if (box) box.innerHTML = '<div class="brreg-loading">Søker i Brønnøysundregisteret …</div>';

    fetch('https://data.brreg.no/enhetsregisteret/api/enheter?' + params + '&size=1&page=0')
      .then(function (res) { if (!res.ok) throw new Error('feil'); return res.json(); })
      .then(function (data) {
        var total = (data.page && data.page.totalElements) || 0;
        if (!total) { showGeneratorError('Ingen treff med disse filtrene. Prøv et annet sted eller en annen bransje.'); return; }
        drawRandomFirma(params, total, 0);
      })
      .catch(function () { showGeneratorError('Fikk ikke kontakt med Brønnøysundregisteret. Sjekk internett.'); });
  }
  function drawRandomFirma(params, total, attempt) {
    var maxIndex = Math.min(total, 10000) - 1;
    var randomIndex = Math.floor(Math.random() * (maxIndex + 1));
    var page = Math.floor(randomIndex / 20);
    var indexInPage = randomIndex % 20;
    fetch('https://data.brreg.no/enhetsregisteret/api/enheter?' + params + '&size=20&page=' + page)
      .then(function (res) { if (!res.ok) throw new Error('feil'); return res.json(); })
      .then(function (data) {
        var enheter = (data._embedded && data._embedded.enheter) || [];
        if (!enheter.length) { showGeneratorError('Fant ingen treff. Prøv igjen.'); return; }
        var candidate = enheter[Math.min(indexInPage, enheter.length - 1)];
        var alleredeKunde = kunder.some(function (k) { return k.orgnr && candidate.organisasjonsnummer && k.orgnr === candidate.organisasjonsnummer; });
        if (alleredeKunde && attempt < 5) { drawRandomFirma(params, total, attempt + 1); return; }
        showGeneratorResult(candidate);
      })
      .catch(function () { showGeneratorError('Fikk ikke kontakt med Brønnøysundregisteret. Sjekk internett.'); });
  }
  function pickRandomInnvending() {
    var orgSelect = document.getElementById('gen-org');
    var orgId = orgSelect ? orgSelect.value : '';
    var pool = generelleInnvendinger.slice();
    var org = orgId ? orgById(orgId) : null;
    if (org && org.innvendinger.length) pool = pool.concat(org.innvendinger);
    if (!pool.length) return null;
    return pool[Math.floor(Math.random() * pool.length)];
  }
  function showGeneratorResult(enhet) {
    state.genFirma = enhet;
    state.visInnvending = false;

    if (firmaInput) firmaInput.value = enhet.navn || '';
    if (orgnrInput) orgnrInput.value = enhet.organisasjonsnummer || '';

  function confirmImport() {

  function csvEscape(val) {
    var s = String(val == null ? '' : val);
    if (/[;"\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
  function exportJSON() {
    var payload = { kunder: kunder, organisasjoner: organisasjoner, generelleInnvendinger: generelleInnvendinger, eksportert: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    downloadBlob(blob, 'ringeliste-backup-' + todayStr() + '.json');
  }
  function exportCSV() {
    var headers = ['Bedrift','Kontaktperson','Telefon','E-post','Org.nr','Adresse','Kilde','Organisasjon','Status','Neste oppfolging','Siste notat'];
    var rows = kunder.map(function (k) {
      var orgNavn = k.organisasjonId ? ((orgById(k.organisasjonId) || {}).navn || '') : '';
      return [k.firma, k.kontaktperson, k.telefon, k.epost, k.orgnr, k.adresse, k.kilde, orgNavn, (STATUS[k.status] || {}).label || k.status, k.nesteOppfolging || '', (k.notater[0] || {}).tekst || ''];
    });
    var all = [headers].concat(rows);
    var csv = all.map(function (r) { return r.map(csvEscape).join(';'); }).join('\r\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    downloadBlob(blob, 'ringeliste-' + todayStr() + '.csv');
  }
  function setupImportFile() {
    var fileInput = document.getElementById('import-json-file');
    if (!fileInput) return;
    fileInput.addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (ev) {
        try {
          var data = JSON.parse(ev.target.result);
          var nyeKunder, nyeOrg, nyeInnv;
          if (Array.isArray(data)) { nyeKunder = data; nyeOrg = null; nyeInnv = null; }
          else if (data && Array.isArray(data.kunder)) { nyeKunder = data.kunder; nyeOrg = Array.isArray(data.organisasjoner) ? data.organisasjoner : null; nyeInnv = Array.isArray(data.generelleInnvendinger) ? data.generelleInnvendinger : null; }
          else { throw new Error('format'); }
          var melding = 'Dette erstatter ' + kunder.length + ' kunder på enheten med ' + nyeKunder.length + ' fra filen.';
          if (nyeOrg) melding += ' Organisasjoner og innvendinger gjenopprettes også.';
          if (confirm(melding + ' Fortsette?')) {
            kunder = nyeKunder; save();
            if (nyeOrg) { organisasjoner = nyeOrg; saveOrg(); }
            if (nyeInnv) { generelleInnvendinger = nyeInnv; saveInnvendinger(); }
            render();
          }
        } catch (err) {
          alert('Kunne ikke lese filen. Sjekk at det er en gyldig backup-fil.');
        }
      };
      reader.readAsText(file);
    });
  }

  function kundeCard(k, showCallback) {

    var html = '<div class="card" style="border-left-color:' + st.color + '" data-action="open-detail" data-id="' + esc(k.id) + '">';
    html += '<div class="card-top"><div class="card-name">' + esc(navn) + '</div><span class="badge" style="color:' + st.color + ';background:' + st.color + '1A">' + st.label + '</span></div>';
    if (k.firma && k.kontaktperson) html += '<div class="card-sub">' + esc(k.kontaktperson) + '</div>';
    if (k.organisasjonId) {
      var kOrg = orgById(k.organisasjonId);
      if (kOrg) html += '<div class="org-tag">' + esc(kOrg.navn) + '</div>';
    }
    if (lastNote) html += '<div class="card-note">' + esc(truncate(lastNote.tekst, 80)) + '</div>';
    html += '<div class="card-bottom">';
    html += k.telefon ? '<a class="call-link" href="tel:' + esc(k.telefon.replace(/\s/g, '')) + '" onclick="event.stopPropagation()">' + phoneIcon() + ' ' + esc(k.telefon) + '</a>' : '<span></span>';
    html += (showCallback && k.nesteOppfolging) ? '<span class="callback-date">' + formatDateShort(k.nesteOppfolging) + '</span>' : '';
    html += '</div></div>';
    return html;
  }

  function renderDashboard() {
    var today = todayStr();
    var withDate = kunder.filter(function (k) { return k.nesteOppfolging; });
    var overdue = withDate.filter(function (k) { return k.nesteOppfolging < today; }).sort(function (a, b) { return a.nesteOppfolging.localeCompare(b.nesteOppfolging); });
    var dueToday = withDate.filter(function (k) { return k.nesteOppfolging === today; });
    var total = overdue.length + dueToday.length;
    var html = '<div class="view view-dashboard"><div class="hero"><div class="hero-number">' + total + '</div><div class="hero-label">å ringe i dag</div></div>';
    if (overdue.length) {
      html += '<div class="section-label section-label-overdue">Forfalt (' + overdue.length + ')</div>';
      html += overdue.map(function (k) { return kundeCard(k, true); }).join('');
    }
    if (dueToday.length) {
      html += '<div class="section-label section-label-today">I dag (' + dueToday.length + ')</div>';
      html += dueToday.map(function (k) { return kundeCard(k, true); }).join('');
    }
    if (!total) {
      html += '<div class="empty-state"><p>Ingen oppfølginger i dag.</p><p class="empty-sub">Gå til Kunder for hele listen, eller legg til en ny kunde.</p></div>';
    }
    html += '</div>';
    return html;
  }

  function filteredKunder() {
    var list = kunder;
    if (state.filter === 'eksisterende') list = list.filter(function (k) { return k.kilde === 'eksisterende'; });
    else if (state.filter === 'ny') list = list.filter(function (k) { return k.kilde === 'ny'; });
    else if (state.filter.indexOf('status:') === 0) {
      var st = state.filter.slice(7);
      list = list.filter(function (k) { return k.status === st; });
    }
    if (state.orgFilter) list = list.filter(function (k) { return k.organisasjonId === state.orgFilter; });
    if (state.search.trim()) {
      var q = state.search.trim().toLowerCase();
      var qDigits = q.replace(/\s/g, '');
      list = list.filter(function (k) {
        return (k.firma || '').toLowerCase().indexOf(q) !== -1 ||
          (k.kontaktperson || '').toLowerCase().indexOf(q) !== -1 ||
          (k.telefon || '').replace(/\s/g, '').indexOf(qDigits) !== -1;
      });
    }
    return list.slice().sort(function (a, b) { return (b.oppdatert || '').localeCompare(a.oppdatert || ''); });
  }
  function chipsHtml() {
    var filters = [{ key: 'all', label: 'Alle' }, { key: 'eksisterende', label: 'Eksisterende' }, { key: 'ny', label: 'Nye' }];
    STATUS_ORDER.forEach(function (s) { filters.push({ key: 'status:' + s, label: STATUS[s].label }); });
    return filters.map(function (f) { return '<button type="button" class="chip ' + (state.filter === f.key ? 'chip-active' : '') + '" data-action="set-filter" data-filter="' + f.key + '">' + f.label + '</button>'; }).join('');
  }
  function listResultsHtml() {

    return list.map(function (k) { return kundeCard(k, true); }).join('');
  }

  function afterRender() {
    var searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', function () {
        state.search = this.value;
        updateListResults();
      });
    }
    var firmaInput = document.getElementById('f-firma');
    if (firmaInput) {
      var timer;
      firmaInput.addEventListener('input', function () {
        clearTimeout(timer);
        var val = this.value;
        if (val.trim().length < 3) {
          var box = document.getElementById('brreg-suggestions');
          if (box) box.innerHTML = '';
          return;
        }
        timer = setTimeout(function () { searchBrregLive(val); }, 400);
      });
    }
    setupImportFile();
    var orgFilterSelect = document.getElementById('org-filter-select');
    if (orgFilterSelect) {
      orgFilterSelect.addEventListener('change', function () {
        state.orgFilter = this.value;
        updateListResults();
      });
    }
    renderGeneratorResult();
    var logStatusSelect = document.querySelector('form[data-action="add-notat"] select[name="status"]');
    if (logStatusSelect) {
      logStatusSelect.addEventListener('change', function () {
        var terminal = ['solgt', 'ikke_interessert', 'feil_nummer'];
        if (terminal.indexOf(this.value) !== -1) {
          var dateInput = document.querySelector('form[data-action="add-notat"] input[name="nesteOppfolging"]');
          if (dateInput) dateInput.value = '';
        }
      });
    }
  }

  // ---------- Events ----------
  function onClick(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.dataset.action;
    var id = el.dataset.id;

    if (action === 'nav') {
      state.view = el.dataset.view; state.selectedId = null; state.selectedOrgId = null; state.importPreview = null;
      state.search = ''; state.filter = 'all'; state.orgFilter = '';
      render();
    } else if (action === 'open-detail') {
      state.view = 'detail'; state.selectedId = id; render();
    } else if (action === 'open-org') {
      state.view = 'orgDetail'; state.selectedOrgId = id; render();
    } else if (action === 'back') {
      state.view = el.dataset.back || 'list'; render();
    } else if (action === 'delete-kunde') {
      var k = kunder.filter(function (x) { return x.id === id; })[0];
      if (k && confirm('Slette ' + (k.firma || k.kontaktperson || 'kunden') + '? Dette kan ikke angres.')) {
        deleteKunde(id); state.view = 'list'; render();
      }
    } else if (action === 'delete-org') {
      var o = orgById(id);
      if (o && confirm('Slette ' + o.navn + '? Egne innvendinger for denne organisasjonen forsvinner også.')) {
        deleteOrg(id); state.view = 'org'; render();
      }
    } else if (action === 'delete-org-innvending') {
      deleteOrgInnvending(el.dataset.org, id); render();
    } else if (action === 'delete-generell-innvending') {
      deleteGenerellInnvending(id); render();
    } else if (action === 'generer-firma') {
      genererTilfeldigFirma();
    } else if (action === 'vis-innvending') {
      state.visInnvending = true; renderGeneratorResult();
    } else if (action === 'set-filter') {
      state.filter = el.dataset.filter; updateListResults();
    } else if (action === 'export-json') {
      exportJSON();
    } else if (action === 'export-csv') {
      exportCSV();
    } else if (action === 'clear-all') {
      if (confirm('Slette ALLE kunder og notater fra denne enheten? Dette kan ikke angres.')) { kunder = []; save(); render(); }
    } else if (action === 'pick-brreg') {
      var enhet = state.brregResults.filter(function (r) { return r.organisasjonsnummer === id; })[0];
      if (enhet) fillBrregIntoForm(enhet);
    } else if (action === 'import-preview') {
      previewImport();
    } else if (action === 'import-confirm') {
      confirmImport();
    } else if (action === 'import-cancel') {
      state.importPreview = null;
      var area = document.getElementById('import-preview-area');
      if (area) area.innerHTML = '';
    }
  }

  function onSubmit(e) {
    e.preventDefault();
    var form = e.target;
    var action = form.dataset.action;
    var fd = new FormData(form);

    if (action === 'add-kunde') {
      var firma = (fd.get('firma') || '').toString().trim();
      var kontaktperson = (fd.get('kontaktperson') || '').toString().trim();
      if (!firma && !kontaktperson) { alert('Skriv inn minst bedriftsnavn eller kontaktperson.'); return; }
      var k = addKunde({
        firma: firma, kontaktperson: kontaktperson,
        telefon: (fd.get('telefon') || '').toString().trim(),
        epost: (fd.get('epost') || '').toString().trim(),
        orgnr: (fd.get('orgnr') || '').toString().trim(),
        adresse: (fd.get('adresse') || '').toString().trim(),
        kilde: fd.get('kilde'),
        organisasjonId: fd.get('organisasjonId') || null
      });
      state.genFirma = null; state.genInnvending = null;
      state.view = 'detail'; state.selectedId = k.id; render();
    } else if (action === 'edit-kunde') {
      updateKunde(form.dataset.id, {
        firma: (fd.get('firma') || '').toString().trim(),
        kontaktperson: (fd.get('kontaktperson') || '').toString().trim(),
        telefon: (fd.get('telefon') || '').toString().trim(),
        epost: (fd.get('epost') || '').toString().trim(),
        orgnr: (fd.get('orgnr') || '').toString().trim(),
        adresse: (fd.get('adresse') || '').toString().trim(),
        kilde: fd.get('kilde'),
        organisasjonId: fd.get('organisasjonId') || null
      });
      render();
    } else if (action === 'add-notat') {
      addNotat(form.dataset.id, {
        tekst: (fd.get('tekst') || '').toString().trim(),
        nesteOppfolging: (fd.get('nesteOppfolging') || '').toString(),
        status: fd.get('status')
      });
      render();
    } else if (action === 'add-org') {
      var navn = (fd.get('navn') || '').toString().trim();
      if (!navn) { alert('Skriv inn navn på organisasjonen.'); return; }
      var naerStrNew = (fd.get('anbefalteNaeringer') || '').toString().trim();
      var naerArrNew = naerStrNew ? naerStrNew.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
      addOrg({ navn: navn, kortBeskrivelse: (fd.get('kortBeskrivelse') || '').toString().trim(), hvorfor: (fd.get('hvorfor') || '').toString().trim(), anbefalteNaeringer: naerArrNew });
      render();
    } else if (action === 'edit-org') {
      var naerStr = (fd.get('anbefalteNaeringer') || '').toString().trim();
      var naerArr = naerStr ? naerStr.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
      updateOrg(form.dataset.id, { navn: (fd.get('navn') || '').toString().trim(), kortBeskrivelse: (fd.get('kortBeskrivelse') || '').toString().trim(), hvorfor: (fd.get('hvorfor') || '').toString().trim(), anbefalteNaeringer: naerArr });
      render();
    } else if (action === 'add-org-innvending') {
      var innvO = (fd.get('innvending') || '').toString().trim();
      if (!innvO) { alert('Skriv inn en innvending.'); return; }
      addOrgInnvending(form.dataset.id, innvO, (fd.get('tips') || '').toString().trim());
      render();
    } else if (action === 'add-generell-innvending') {
      var innvG = (fd.get('innvending') || '').toString().trim();
      if (!innvG) { alert('Skriv inn en innvending.'); return; }
      addGenerellInnvending(innvG, (fd.get('tips') || '').toString().trim());
      render();
    }
  }

  // ---------- Init ----------
  load();
  loadOrg();
  loadInnvendinger();
  var appEl = document.getElementById('app');
  appEl.addEventListener('click', onClick);
  appEl.addEventListener('submit', onSubmit);
  render();
})();
</script>
</body>
</html>
